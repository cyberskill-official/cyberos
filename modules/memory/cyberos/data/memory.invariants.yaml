# memory.invariants.yaml — declarative invariants for the CyberOS memory self-audit walker
#
# This file replaces the prose §8.7 "7-phase self-audit" in AGENTS.md with a
# code-walkable list. The Deep Optimization Audit §4.2 row 35 calls for this:
# "Replace 7 prose phases with a single declarative invariant set
# (Postgres CHECK-constraint style), walked by one function."
#
# Each invariant has:
#   id          stable identifier (used for skip/include lists, CI gates)
#   level       error | warning | info — severity if violated
#   scope       what the invariant covers (filesystem | ledger | manifest | export | crypto)
#   description plain-English statement of the invariant
#   check       reference to the Python function in cyberos.core.invariants
#               that returns (passed: bool, details: str)
#   citation    optional reference to the protocol section it pins
#
# Future work (Phase B of Deep Audit W0): write
# cyberos/core/invariants.py exporting the check functions, plus a single
# walker that iterates this list and surfaces a single self-audit report.

version: 1
generated_by: hand-written; CI verifies coverage of every check function

invariants:
  # ===== Filesystem layout =====

  - id: layout-root-canonical
    level: error
    scope: filesystem
    description: |
      The .cyberos/memory/store/ root MUST contain exactly the canonical
      top-level directories listed in §3 of AGENTS.md and the canonical
      files (manifest.json, optional .lock, optional HEAD).
    check: cyberos.core.invariants.check_layout_root_canonical
    citation: AGENTS.md §3

  - id: layout-no-sandbox-path
    level: error
    scope: filesystem
    description: |
      The resolved .cyberos/memory/store/ path MUST NOT match any forbidden
      sandbox-fragment listed in §0.1 (e.g. /sessions/, /tmp/, etc.)
      unless CYBEROS_HOST_MOUNT_PREFIX exempts it.
    check: cyberos.core.invariants.check_layout_no_sandbox_path
    citation: AGENTS.md §0.1

  - id: layout-shard-uniformity
    level: warning
    scope: filesystem
    description: |
      Within each memories/<kind>/ directory, shards SHOULD use the
      two-level hex bucket pattern <kind>/<sha[0:2]>/<sha[2:4]>/.
      Direct children that are .md files indicate an un-resharded leftover
      from migration.
    check: cyberos.core.invariants.check_layout_shard_uniformity
    citation: cyberos_migrate_v2.phase_3_reshard_memories

  - id: layout-no-sync-conflict-siblings
    level: warning
    scope: filesystem
    description: |
      iCloud / Dropbox / OneDrive / Google Drive / Box / Syncthing / Resilio
      may leave conflict-marker files beside canonical memories when two
      machines edit concurrently. Those files are NOT in the audit chain
      and represent bytes the ledger has never seen. The operator should
      run `cyberos resolve-conflict <path>` to inspect the diff and decide
      which side to keep, then `cyberos put` to introduce the winner
      properly into the chain.
    check: cyberos.core.invariants.check_layout_no_sync_conflict_siblings
    citation: cyberos.core.conflicts

  # ===== Audit ledger =====

  - id: ledger-link-invariant
    level: error
    scope: ledger
    description: |
      In every binlog segment, row[N].prev_chain MUST equal
      row[N-1].chain. Across segment boundaries, the last chain of
      segment K is the start_prev of segment K+1.
    check: cyberos.core.invariants.check_ledger_link
    citation: AGENTS.md §7 LINK invariant

  - id: ledger-hash-invariant
    level: error
    scope: ledger
    description: |
      In every binlog segment, row.chain MUST equal SHA-256 of
      canonical_json(row_minus_chain) || prev_chain. Failure means
      either tampering or canonicalisation drift.
    check: cyberos.core.invariants.check_ledger_hash
    citation: AGENTS.md §7.2 / cyberos.core.writer._chain_hash

  - id: ledger-crc-tail
    level: warning
    scope: ledger
    description: |
      The last frame's CRC-32C MUST match its payload. A mismatch is
      treated as truncation (Bitcask convention) and recovery truncates
      the tail; this invariant exists to surface the event for review.
    check: cyberos.core.invariants.check_ledger_crc_tail
    citation: cyberos.core.walker.MmapWalker.iter_records

  - id: ledger-mmr-cross-check
    level: error
    scope: ledger
    description: |
      MMR cross-check: the MMR root recomputed by replaying the binlog
      MUST equal the root persisted in audit/mmr/peaks.bin. Divergence
      means the additive MMR is out of sync with the chain; the chain
      is authoritative, so this surfaces an MMR bug.
    check: cyberos.core.invariants.check_ledger_mmr_cross_check
    citation: cyberos/core/mmr.py

  - id: ledger-append-only
    level: error
    scope: ledger
    description: |
      No record in a sealed binlog segment may be modified or deleted
      after the next record is written. Enforcement via the single-writer
      lock and the LINK invariant — this invariant fails on tampering.
    check: cyberos.core.invariants.check_ledger_append_only
    citation: AGENTS.md §7.4 forbidden ops

  # ===== Manifest =====

  - id: manifest-validates-against-schema
    level: error
    scope: manifest
    description: |
      manifest.json MUST validate against
      docs/memory/memory.schema.json#/definitions/Manifest.
    check: cyberos.core.invariants.check_manifest_validates

  # ===== Export determinism =====

  - id: export-determinism
    level: error
    scope: export
    description: |
      Two consecutive exports of the same store MUST produce
      byte-identical zip outputs. Determinism is the
      portability-invariant of the protocol (§11 / AGENTS.md §3.C.5).
    check: cyberos.core.invariants.check_export_determinism
    citation: AGENTS.md §11

  # ===== Crypto / durability =====

  - id: crypto-crc-implementation
    level: warning
    scope: crypto
    description: |
      The writer SHOULD use the hardware-accelerated CRC-32C
      implementation (crc32c PyPI wheel). zlib-fallback uses CRC-32
      with a different polynomial; existing frames will appear
      corrupt to the hardware reader and vice versa.
    check: cyberos.core.invariants.check_crc_implementation
    citation: cyberos.core.writer.crc_implementation

  - id: durability-platform-correct
    level: error
    scope: crypto
    description: |
      On macOS, durable_sync MUST resolve to F_BARRIERFSYNC (per-batch)
      or F_FULLFSYNC (checkpoint), never plain fsync() — which does NOT
      flush the device write cache on Darwin. Documented in
      cyberos/core/fsync.py module docstring.
    check: cyberos.core.invariants.check_durability_platform_correct
    citation: cyberos/core/fsync.py

  # ===== Dreaming (§7.7) =====

  - id: dream-applied-row-has-provenance
    level: error
    scope: ledger
    description: |
      Every audit row emitted by the dream-applier MUST carry both
      extra.dream_id (matching the active dream.start row) and
      extra.proposal_id (matching the source DreamProposal). Checked on
      dream.proposal_applied aux rows and on put/move/delete mutation
      rows that carry either provenance key. Runner rows (dream.start /
      dream.complete / dream.detector_failed) carry only dream_id by
      design and are exempt.
    check: cyberos.core.invariants.check_dream_applied_provenance
    citation: AGENTS.md §7.7.2

  # ===== Store-level ACL (§14.4) =====

  - id: store-yaml-acl-valid
    level: error
    scope: filesystem
    description: |
      Every STORE.yaml under the store MUST validate against
      memory.schema.json#/definitions/StoreAcl: required store_id
      (^[a-z][a-z0-9_-]{0,63}$) and acl list; entries are {actor, mode}
      objects with mode in the closed enum read | read-write | deny;
      no additional properties.
    check: cyberos.core.invariants.check_store_yaml_acl_valid
    citation: AGENTS.md §14.4.7

  # ===== Session transcript ledger (§18) =====

  - id: session-lifecycle
    level: error
    scope: ledger
    description: |
      §18.8 lifecycle invariants: every session.start has 0 or 1
      session.end for the same session_id (duplicate starts for one id
      mean the writer was bypassed); within a session's binlog,
      turn_seq is strictly monotonically increasing from 0; no
      session turn precedes its session.start or follows its
      session.end. Retention-purged bodies (tombstones, §18.6) are
      exempt from the turn checks.
    check: cyberos.core.invariants.check_session_lifecycle
    citation: AGENTS.md §18.8
