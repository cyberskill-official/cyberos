<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#F8FAFC"/>
  <text x="600" y="50" font-size="26" font-weight="700" fill="#0F172A" text-anchor="middle">SKILL.md frontmatter — 33 fields, three audiences</text>
  <text x="600" y="80" font-size="14" fill="#64748B" text-anchor="middle">Group 1 ships anywhere. Group 2 needs the CyberOS runtime. Group 3 is v0.2.0 governance.</text>

  <!-- Group 1: Portable -->
  <rect x="60" y="120" width="360" height="600" rx="14" fill="#10B981" filter="url(#sh)"/>
  <text x="240" y="160" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">§3.1  Portable</text>
  <text x="240" y="184" font-size="12" fill="#A7F3D0" text-anchor="middle">Loads anywhere a SKILL.md is read</text>
  <text x="240" y="200" font-size="11" fill="#A7F3D0" text-anchor="middle">(Anthropic, Antigravity, vanilla loaders)</text>

  <g font-family="JetBrains Mono, monospace" font-size="14" fill="#fff">
    <text x="90" y="260">name</text>
    <text x="90" y="295">description</text>
    <text x="90" y="330">skill_version</text>
  </g>
  <text x="240" y="700" font-size="11" fill="#A7F3D0" text-anchor="middle" font-style="italic">3 fields</text>

  <!-- Group 2: CyberOS extensions -->
  <rect x="440" y="120" width="360" height="600" rx="14" fill="#1E2A78" filter="url(#sh)"/>
  <text x="620" y="160" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">§3.2  CyberOS runtime</text>
  <text x="620" y="184" font-size="12" fill="#C7D2FE" text-anchor="middle">Need CyberOS to enforce</text>
  <text x="620" y="200" font-size="11" fill="#C7D2FE" text-anchor="middle">(non-CyberOS hosts ignore)</text>

  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#fff">
    <text x="470" y="240">persona</text>
    <text x="470" y="262">owner_role</text>
    <text x="470" y="284">allowed_brain_scopes</text>
    <text x="470" y="306">allowed_mcp_tools</text>
    <text x="470" y="328">escalation</text>
    <text x="470" y="350">expects (schema_ref + required_fields)</text>
    <text x="470" y="372">produces (schema_ref + output_kind)</text>
    <text x="470" y="394">audit (row_kind + payload_hash_field)</text>
    <text x="470" y="416">confidence_band</text>
    <text x="470" y="438">untrusted_inputs</text>
    <text x="470" y="460">determinism</text>
    <text x="470" y="482">emitted_source_freshness_tier</text>
    <text x="470" y="504">gated_until_phase</text>
  </g>
  <text x="620" y="700" font-size="11" fill="#C7D2FE" text-anchor="middle" font-style="italic">13 fields</text>

  <!-- Group 3: v0.2.0 governance -->
  <rect x="820" y="120" width="320" height="600" rx="14" fill="#F59E0B" filter="url(#sh)"/>
  <text x="980" y="160" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">§3.3  v0.2.0  🆕</text>
  <text x="980" y="184" font-size="12" fill="#0F1444" text-anchor="middle">Portability + governance</text>
  <text x="980" y="200" font-size="11" fill="#0F1444" text-anchor="middle">DEC-090..093</text>

  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#fff">
    <text x="850" y="240">invocation_modes</text>
    <text x="850" y="262">expects.optional_fields</text>
    <text x="850" y="284">expects.standalone_interview_ref</text>
    <text x="850" y="306">produces.human_summary_ref</text>
    <text x="850" y="328">depends_on_contracts</text>
    <text x="850" y="350">exposable_as.internal</text>
    <text x="850" y="372">exposable_as.agent_plugin</text>
    <text x="850" y="394">exposable_as.mcp_tool</text>
    <text x="850" y="416">exposable_as.partner_connector</text>
    <text x="850" y="438">self_audit.invariants_ref</text>
    <text x="850" y="460">self_audit.check_at</text>
    <text x="850" y="482">self_audit.anomaly_signals</text>
    <text x="850" y="504">self_audit.on_breach</text>
    <text x="850" y="526">human_fine_tune.fine_tuner_role</text>
    <text x="850" y="548">human_fine_tune.review_required</text>
    <text x="850" y="570">human_fine_tune.signals_to_initiate</text>
    <text x="850" y="592">human_fine_tune.required_artifacts</text>
  </g>
  <text x="980" y="700" font-size="11" fill="#0F1444" text-anchor="middle" font-style="italic">17 sub-fields under 6 blocks</text>

  <text x="600" y="740" font-size="11" fill="#94A3B8" text-anchor="middle">02-frontmatter-field-families.svg</text>
</svg>
