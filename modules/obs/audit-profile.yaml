# CAF audit identity for the `obs` module (Rust crate cyberos-obs-collector, services/obs-collector).
# verify-target.sh runs RUN_COMMANDS from this dir to prove TARGET HEALTH. Run on a build machine with
# the Rust toolchain.
config:
  TECH_STACK: Rust (cargo) / cyberos-obs-collector / OTel Collector config + LGTM stack
  PROJECT_PURPOSE: CyberOS observability - OTLP collector, PII scrub, tenant-aware telemetry
  MODE: gated
  DEPTH: standard
  SEVERITY_FLOOR: High
  PROTECTED_AREAS: modules/obs/.awh/, modules/obs/.caf/, services/obs-collector/tests/
  RUN_COMMANDS: cd ../../services && cargo test -p cyberos-obs-collector; cd ../../services && cargo test -p cyberos-obs-proxy; cd ../../services && cargo clippy -p cyberos-obs-proxy --all-targets -- -D warnings; cd ../../services && cargo test -p cyberos-obs-sdk; cd ../../services && cargo clippy -p cyberos-obs-sdk --all-targets -- -D warnings; cd ../../services && cargo test -p cyberos-obs-router; cd ../../services && cargo clippy -p cyberos-obs-router --all-targets -- -D warnings
  DOMAIN_NOTES: Four crates - obs-collector (FR-OBS-001 PII scrub is the compliance invariant), obs-proxy (FR-OBS-002 tenant isolation; the cross-tenant no-leak property is the security invariant), obs-sdk (FR-OBS-003 RED metrics; status_class cardinality bounding + the cardinality guard are the invariants), and obs-router (FR-OBS-007 alert routing; sev-1-always-pages-both + no-silent-drop are the invariants). obs-proxy, obs-sdk, and obs-router are clippy-clean so their clippy -D warnings is gated; add `cargo clippy -p cyberos-obs-collector -- -D warnings` once obs-collector is confirmed clippy-clean too.
  BENCHMARK_MODE: none
