# CAF audit identity for the `obs` module (Rust crate cyberos-obs-collector, services/obs-collector).
# verify-target.sh runs RUN_COMMANDS from this dir to prove TARGET HEALTH. Run on a build machine with
# the Rust toolchain.
config:
  TECH_STACK: Rust (cargo) / cyberos-obs-collector / OTel Collector config + LGTM stack
  PROJECT_PURPOSE: CyberOS observability - OTLP collector, PII scrub, tenant-aware telemetry
  MODE: gated
  DEPTH: standard
  SEVERITY_FLOOR: High
  PROTECTED_AREAS: modules/obs/.awh/, modules/obs/.caf/, services/obs-collector/tests/
  RUN_COMMANDS: cd ../../services && cargo test -p cyberos-obs-collector; cd ../../services && cargo test -p cyberos-obs-proxy; cd ../../services && cargo clippy -p cyberos-obs-proxy --all-targets -- -D warnings
  DOMAIN_NOTES: Two crates - obs-collector (FR-OBS-001 PII scrub is the compliance invariant) and obs-proxy (FR-OBS-002 tenant isolation; the cross-tenant no-leak property is the security invariant). obs-proxy is clippy-clean so its clippy -D warnings is gated; add `cargo clippy -p cyberos-obs-collector -- -D warnings` once obs-collector is confirmed clippy-clean too.
  BENCHMARK_MODE: none
