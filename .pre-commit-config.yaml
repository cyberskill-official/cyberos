- repo: local
    hooks:
      - id: awh-gate
        name: awh module gate (changed modules)
        entry: .pre-commit-hooks/awh-gate.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
      - id: cyberos-payload-build
        name: rebuild dist/cyberos when a vendored source changes
        entry: .pre-commit-hooks/cyberos-payload-build.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
      - id: docs-site-build
        name: rebuild the generated website when a doc source changes
        entry: .pre-commit-hooks/docs-site-build.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
