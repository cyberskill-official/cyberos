[package]
name = "cyberos-skill-cli"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "cyberos-skill"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
clap.workspace = true
cyberos-skill-host = { path = "../host" }
cyberos-skill-manifest = { path = "../manifest" }
serde_json.workspace = true
sha2.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
walkdir.workspace = true

[features]
default = []
# Forwards the host crate's wasm feature so `cargo build --features wasm`
# from the CLI directory enables the Wasmtime component-model executor.
wasm = ["cyberos-skill-host/wasm"]
