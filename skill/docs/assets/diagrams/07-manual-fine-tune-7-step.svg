<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="prim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2A78"/><stop offset="100%" stop-color="#0F1444"/>
    </linearGradient>
    <linearGradient id="hum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F172A"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="1400" height="700" fill="#F8FAFC"/>
  <text x="700" y="50" font-size="26" font-weight="700" fill="#0F172A" text-anchor="middle">Manual fine-tune — the human loop (7-step playbook)</text>
  <text x="700" y="80" font-size="14" fill="#64748B" text-anchor="middle">When auto-refinement can't resolve a pattern, a human takes over via this structured cycle.</text>

  <!-- 7 steps in a row -->
  <g>
    <!-- Step 1 -->
    <rect x="60" y="140" width="180" height="180" rx="10" fill="url(#hum)" filter="url(#sh)"/>
    <circle cx="100" cy="180" r="22" fill="#F59E0B"/>
    <text x="100" y="187" font-size="18" font-weight="700" fill="#0F1444" text-anchor="middle">1</text>
    <text x="135" y="187" font-size="15" font-weight="700" fill="#fff">Pause</text>
    <text x="80" y="225" font-size="12" fill="#E2E8F0">Set skill to</text>
    <text x="80" y="243" font-size="12" fill="#E2E8F0">maintenance mode.</text>
    <text x="80" y="270" font-size="11" fill="#F59E0B" font-family="JetBrains Mono, monospace">Routes return:</text>
    <text x="80" y="287" font-size="10" fill="#F59E0B" font-family="JetBrains Mono, monospace">E_SKILL_</text>
    <text x="80" y="302" font-size="10" fill="#F59E0B" font-family="JetBrains Mono, monospace">MAINTENANCE</text>

    <!-- Step 2 -->
    <rect x="250" y="140" width="180" height="180" rx="10" fill="url(#hum)" filter="url(#sh)"/>
    <circle cx="290" cy="180" r="22" fill="#F59E0B"/>
    <text x="290" y="187" font-size="18" font-weight="700" fill="#0F1444" text-anchor="middle">2</text>
    <text x="325" y="187" font-size="15" font-weight="700" fill="#fff">Diagnose</text>
    <text x="270" y="225" font-size="12" fill="#E2E8F0">Read action_log</text>
    <text x="270" y="243" font-size="12" fill="#E2E8F0">for affected window.</text>
    <text x="270" y="265" font-size="12" fill="#E2E8F0">Cluster failures by</text>
    <text x="270" y="283" font-size="12" fill="#E2E8F0">distinct mode.</text>

    <!-- Step 3 -->
    <rect x="440" y="140" width="180" height="180" rx="10" fill="url(#acc)" filter="url(#sh)"/>
    <circle cx="480" cy="180" r="22" fill="#0F1444"/>
    <text x="480" y="187" font-size="18" font-weight="700" fill="#F59E0B" text-anchor="middle">3</text>
    <text x="515" y="187" font-size="14" font-weight="700" fill="#fff">Add</text>
    <text x="515" y="206" font-size="14" font-weight="700" fill="#fff">regression</text>
    <text x="460" y="240" font-size="12" fill="#fff">golden-input +</text>
    <text x="460" y="258" font-size="12" fill="#fff">golden-output</text>
    <text x="460" y="276" font-size="12" fill="#fff">per distinct</text>
    <text x="460" y="294" font-size="12" fill="#fff">failure mode.</text>

    <!-- Step 4 -->
    <rect x="630" y="140" width="180" height="180" rx="10" fill="url(#acc)" filter="url(#sh)"/>
    <circle cx="670" cy="180" r="22" fill="#0F1444"/>
    <text x="670" y="187" font-size="18" font-weight="700" fill="#F59E0B" text-anchor="middle">4</text>
    <text x="705" y="187" font-size="15" font-weight="700" fill="#fff">Edit</text>
    <text x="650" y="225" font-size="12" fill="#fff">SKILL.md body /</text>
    <text x="650" y="243" font-size="12" fill="#fff">INVARIANTS.md /</text>
    <text x="650" y="261" font-size="12" fill="#fff">RUBRIC.md.</text>
    <text x="650" y="287" font-size="11" fill="#FED7AA" font-style="italic">Pass new tests,</text>
    <text x="650" y="302" font-size="11" fill="#FED7AA" font-style="italic">don't break old.</text>

    <!-- Step 5 -->
    <rect x="820" y="140" width="180" height="180" rx="10" fill="#10B981" filter="url(#sh)"/>
    <circle cx="860" cy="180" r="22" fill="#fff"/>
    <text x="860" y="187" font-size="18" font-weight="700" fill="#10B981" text-anchor="middle">5</text>
    <text x="895" y="187" font-size="14" font-weight="700" fill="#fff">Re-run</text>
    <text x="895" y="206" font-size="14" font-weight="700" fill="#fff">suite</text>
    <text x="840" y="240" font-size="12" fill="#fff">old + new</text>
    <text x="840" y="258" font-size="12" fill="#fff">golden cases.</text>
    <text x="840" y="285" font-size="12" font-weight="700" fill="#fff">ALL must pass.</text>

    <!-- Step 6 -->
    <rect x="1010" y="140" width="180" height="180" rx="10" fill="#10B981" filter="url(#sh)"/>
    <circle cx="1050" cy="180" r="22" fill="#fff"/>
    <text x="1050" y="187" font-size="18" font-weight="700" fill="#10B981" text-anchor="middle">6</text>
    <text x="1085" y="187" font-size="14" font-weight="700" fill="#fff">Bump +</text>
    <text x="1085" y="206" font-size="14" font-weight="700" fill="#fff">log</text>
    <text x="1030" y="240" font-size="12" fill="#fff">PATCH / MINOR /</text>
    <text x="1030" y="258" font-size="12" fill="#fff">MAJOR per scope.</text>
    <text x="1030" y="285" font-size="12" fill="#fff">CHANGELOG entry</text>
    <text x="1030" y="302" font-size="12" fill="#fff">with ### Driver.</text>

    <!-- Step 7 -->
    <rect x="1200" y="140" width="180" height="180" rx="10" fill="url(#prim)" filter="url(#sh)"/>
    <circle cx="1240" cy="180" r="22" fill="#F59E0B"/>
    <text x="1240" y="187" font-size="18" font-weight="700" fill="#0F1444" text-anchor="middle">7</text>
    <text x="1275" y="187" font-size="15" font-weight="700" fill="#fff">Resume</text>
    <text x="1220" y="225" font-size="12" fill="#E2E8F0">Set skill to</text>
    <text x="1220" y="243" font-size="12" fill="#E2E8F0">active.</text>
    <text x="1220" y="270" font-size="12" fill="#E2E8F0">Monitor acceptance</text>
    <text x="1220" y="288" font-size="12" fill="#E2E8F0">over 24-48h.</text>
  </g>

  <!-- Arrows -->
  <g stroke="#0F172A" stroke-width="2" fill="none">
    <path d="M 240 230 L 250 230" marker-end="url(#arr)"/>
    <path d="M 430 230 L 440 230" marker-end="url(#arr)"/>
    <path d="M 620 230 L 630 230" marker-end="url(#arr)"/>
    <path d="M 810 230 L 820 230" marker-end="url(#arr)"/>
    <path d="M 1000 230 L 1010 230" marker-end="url(#arr)"/>
    <path d="M 1190 230 L 1200 230" marker-end="url(#arr)"/>
  </g>

  <!-- Required artefacts -->
  <rect x="60" y="370" width="1320" height="100" rx="10" fill="#fff" stroke="#7C3AED" stroke-width="2" filter="url(#sh)"/>
  <text x="80" y="397" font-size="14" font-weight="700" fill="#0F172A">Required artefacts on every fine-tune (validator-enforced)</text>
  <g font-size="12" fill="#0F172A">
    <text x="80" y="425">📝 changelog_entry — Keep-a-Changelog 1.1.0 with ### Driver section citing the trigger</text>
    <text x="700" y="425">🧪 acceptance_test_added — at least one regression case under acceptance/regression-YYYY-MM-DD-slug.md</text>
    <text x="80" y="445">🧠 memory_refinement_entry — append to BRAIN memories/refinements/REF-NNN-slug.md</text>
    <text x="700" y="445">📐 (optional) rubric_rule_diff if RUBRIC.md changed — auditor skills only</text>
  </g>

  <!-- Who can fine-tune table -->
  <rect x="60" y="500" width="1320" height="120" rx="10" fill="#1E2A78" filter="url(#sh)"/>
  <text x="80" y="528" font-size="14" font-weight="700" fill="#fff">Who can fine-tune which skills (per human_fine_tune.fine_tuner_role)</text>
  <g font-size="11" fill="#E2E8F0" font-family="JetBrains Mono, monospace">
    <text x="80" y="555">fine_tuner_role: cpo          → persona owner + registry maintainer</text>
    <text x="80" y="572">fine_tuner_role: _shared      → any persona owner whose persona consumes the skill</text>
    <text x="80" y="589">fine_tuner_role: engineering  → engineering team (DEC-052 §3 annotation)</text>
    <text x="80" y="606">fine_tuner_role: any          → any CyberSkill employee (low-risk skills only, e.g. hello-world)</text>
  </g>

  <!-- Initiation signals -->
  <rect x="60" y="640" width="1320" height="40" rx="10" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="80" y="664" font-size="11" fill="#0F172A">
    <tspan font-weight="700" fill="#B45309">Initiation signals:</tspan>
    acceptance_rate &lt; 60% / 7d  ·  hitl_pause_rate &gt; 40% / 7d  ·  drift_signals &gt; 3 / 7d  ·  user complaint  ·  regulator inquiry  ·  auto-refinement escalation
  </text>

  <text x="700" y="690" font-size="11" fill="#94A3B8" text-anchor="middle">07-manual-fine-tune-7-step.svg</text>
</svg>
