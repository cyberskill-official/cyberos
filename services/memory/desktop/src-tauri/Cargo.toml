# Standalone crate: NOT a member of the services/ cargo workspace (Tauri app with
# its own dependency tree + build cadence). The empty [workspace] table keeps cargo
# from trying to attach it to services/Cargo.toml.
[workspace]

[package]
name = "cyberos-memory-desktop"
version = "0.1.0"
edition = "2021"
description = "CyberOS memory — Tauri 2.x desktop app (sync supervisor + tray + quick capture)"
license = "MIT OR Apache-2.0"
publish = false

# Desktop-only crate: a single [[bin]] entrypoint. (The Tauri 2.x mobile [lib]
# convention was declared here without a src/lib.rs, which broke `cargo check`;
# reintroduce a real lib.rs if/when mobile targets land.)
[[bin]]
name = "cyberos-memory-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"

serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Timestamps for quick-capture frontmatter.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
# Tenant resolution: HOME-relative paths.
dirs = "5"

[features]
# Default features keep the bundle lean; opt in to extras via tauri.conf.json.
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
