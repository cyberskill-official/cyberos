# services/obs-collector/config/otel-collector-config.yaml
#
# FR-OBS-001 §3 — Canonical otelcol-contrib configuration for the LGTM stack.
# Validated by `cyberos-obs validate-config` at deploy time (CI gate).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        auth:
          authenticator: bearertokenauth
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth

processors:
  resource:
    attributes:
      - key: deployment.environment
        value: ${ENV}
        action: upsert
  attributes/pii_scrub:
    actions:
      - key: prompt_text
        action: delete
      - key: response_text
        action: delete
      - key: user_email
        action: delete
      - key: cccd
        action: delete
      - pattern: "(?i)(password|secret|api_?key)\\s*[:=]"
        action: delete
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    labels:
      attributes:
        service.name: "service_name"
        tenant_id: "tenant_id"
        deployment.environment: "env"
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    external_labels:
      source: "otelcol"
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

extensions:
  file_storage:
    directory: /var/lib/otelcol/file_storage
    timeout: 1s
  bearertokenauth:
    scheme: "Bearer"
    filename: /etc/otelcol/auth.tokens
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [file_storage, bearertokenauth, health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [resource, attributes/pii_scrub, batch]
      exporters: [loki]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheusremotewrite]
    traces:
      receivers: [otlp]
      processors: [resource, attributes/pii_scrub, batch]
      exporters: [otlp/tempo]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: info
