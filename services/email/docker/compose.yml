# FR-EMAIL-001 §3.1 — local-dev compose for the EMAIL service.
#
#   docker compose -f services/email/docker/compose.yml up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyberos_email
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-local
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyberos_email"]
      interval: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: cyberos
      MINIO_ROOT_PASSWORD: cyberos-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 12

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-local
    volumes:
      - ../migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export PGPASSWORD="$${POSTGRES_PASSWORD}"

        if ! psql -h postgres -U "$${POSTGRES_USER}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'stalwart_metadata'" | grep -q 1; then
          psql -h postgres -U "$${POSTGRES_USER}" -d postgres -c "CREATE DATABASE stalwart_metadata"
        fi

        if ! psql -h postgres -U "$${POSTGRES_USER}" -d cyberos_email -tAc "SELECT 1 FROM pg_roles WHERE rolname = 'cyberos_app'" | grep -q 1; then
          psql -h postgres -U "$${POSTGRES_USER}" -d cyberos_email -c "CREATE ROLE cyberos_app LOGIN"
        fi

        if psql -h postgres -U "$${POSTGRES_USER}" -d cyberos_email -tAc "SELECT to_regclass('public.message_metadata')" | grep -q message_metadata; then
          echo "email migrations already applied"
        else
          for f in /migrations/*.sql; do
            echo "applying $$f"
            psql -v ON_ERROR_STOP=1 -h postgres -U "$${POSTGRES_USER}" -d cyberos_email -f "$$f"
          done
        fi

  stalwart:
    build:
      context: .
    depends_on:
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-local
      S3_REGION_DEFAULT: ap-southeast-1
      S3_BUCKET_DEFAULT: cyberos-email-sg-1-bodies
      KMS_KEY_DEFAULT: alias/cyberos-email-sg-1-bodies
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
      - "4190:4190"
      - "8080:8080"
    restart: unless-stopped

  cyberos-email:
    build:
      context: ../../..
      dockerfile: services/email/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://postgres:postgres-local@postgres:5432/cyberos_email?sslmode=disable"
      EMAIL_BIND: "0.0.0.0:8085"
    ports:
      - "8085:8085"
