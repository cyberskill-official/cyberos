# FR-AI-017 production Redis profile for the AI Gateway response cache.
#
# The app enforces per-entry limits and tenant-scoped key prefixes. Redis owns
# eviction under pressure; operators should provision one logical cache instance
# per tenant group when stricter hard per-tenant budgets are required.

maxmemory 100mb
maxmemory-policy allkeys-lru
timeout 0
tcp-keepalive 300
save ""
appendonly no
