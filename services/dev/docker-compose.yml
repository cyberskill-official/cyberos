# CyberOS — Local dev infrastructure
# Starts Postgres 16 + pgvector + Apache AGE + Redis on standard ports.
# Used by FR-MEMORY-101 (Layer-2 ingest), FR-AUTH-001..109, and
# FR-PROJ-001..018 local database tests.
#
# Quick start (from this directory):
#   docker compose up -d           # Boot Postgres + Redis
#   docker compose logs -f         # Watch logs
#   docker compose down -v         # Tear down + wipe volumes
#
# Connection strings for sqlx tooling. Use one DB per module because each
# service owns its own migration sequence starting at 0001.
#   export AUTH_DATABASE_URL=postgres://cyberos:cyberos@localhost:5432/cyberos_auth
#   export MEMORY_DATABASE_URL=postgres://cyberos:cyberos@localhost:5432/cyberos_memory
#   export PROJ_DATABASE_URL=postgres://cyberos:cyberos@localhost:5432/cyberos_proj
#
# The Postgres image is shared with deploy/vps so dev, live-test, and VPS
# deploys use the same AGE + pgvector extension surface.

services:
  postgres:
    image: cyberos/postgres-age-pgvector:pg16
    build:
      context: ../..
      dockerfile: deploy/vps/postgres.Dockerfile
    container_name: cyberos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cyberos
      POSTGRES_USER: cyberos
      POSTGRES_PASSWORD: cyberos
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - cyberos-pg-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberos -d cyberos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cyberos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cyberos-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrator:
    image: postgres:16-alpine
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: cyberos
      POSTGRES_PASSWORD: cyberos
      AUTH_DB: cyberos_auth
      MEMORY_DB: cyberos_memory
      PROJ_DB: cyberos_proj
      MIGRATION_ROOT: /workspace/services
    volumes:
      - ../..:/workspace:ro
    entrypoint: ["/bin/sh", "/workspace/deploy/vps/scripts/migrate.sh"]

volumes:
  cyberos-pg-data:
  cyberos-redis-data:
