# CyberOS — Local dev infrastructure
# Starts Postgres 16 + pgvector + Redis on standard ports.
# Used by FR-MEMORY-101 (Layer-2 ingest) and FR-AUTH-001..003 (tenant/subject/RLS).
#
# Quick start (from this directory):
#   docker compose up -d           # Boot Postgres + Redis
#   docker compose logs -f         # Watch logs
#   docker compose down -v         # Tear down + wipe volumes
#
# Connection string for sqlx tooling:
#   export DATABASE_URL=postgres://cyberos:cyberos@localhost:5432/cyberos
#
# Postgres is the official `pgvector/pgvector:pg16` image (Postgres 16 + pgvector). pgcrypto/uuid-ossp are
# stdlib extensions enabled in `postgres-init.sql`. Apache AGE was removed - the memory graph is the
# relational l2_edge table - so this matches any managed Postgres.

services:
  postgres:
    # Postgres 16 + pgvector (embeddings), via Dockerfile.postgres (FROM pgvector/pgvector:pg16).
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: cyberos/postgres-pgvector:pg16
    container_name: cyberos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cyberos
      POSTGRES_USER: cyberos
      POSTGRES_PASSWORD: cyberos
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - cyberos-pg-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberos -d cyberos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cyberos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cyberos-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cyberos-pg-data:
  cyberos-redis-data:
