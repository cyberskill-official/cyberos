<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 800" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F172A"/>
    </marker>
    <marker id="arrr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
    <marker id="arrh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="1300" height="800" fill="#F8FAFC"/>
  <text x="650" y="50" font-size="26" font-weight="700" fill="#0F172A" text-anchor="middle">The skill lifecycle</text>
  <text x="650" y="80" font-size="14" fill="#64748B" text-anchor="middle">From idea to archive. Phase gates per PRD §14 (P0 → P4).</text>

  <!-- Idea -->
  <rect x="60" y="140" width="180" height="80" rx="40" fill="#fff" stroke="#64748B" stroke-width="2" filter="url(#sh)"/>
  <text x="150" y="172" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">💡 Idea</text>
  <text x="150" y="192" font-size="11" fill="#64748B" text-anchor="middle">"we should have a</text>
  <text x="150" y="208" font-size="11" fill="#64748B" text-anchor="middle">skill that..."</text>

  <!-- Draft v0.1 -->
  <rect x="290" y="140" width="200" height="80" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#sh)"/>
  <text x="390" y="170" font-size="14" font-weight="700" fill="#B45309" text-anchor="middle">Draft v0.1.0</text>
  <text x="390" y="190" font-size="11" fill="#0F172A" text-anchor="middle">copy hello-world</text>
  <text x="390" y="206" font-size="11" fill="#0F172A" text-anchor="middle">edit frontmatter + body</text>

  <!-- Active v0.x -->
  <rect x="540" y="140" width="200" height="80" rx="10" fill="#10B981" filter="url(#sh)"/>
  <text x="640" y="170" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Active v0.x</text>
  <text x="640" y="190" font-size="11" fill="#fff" text-anchor="middle">Layer 1+2 pass</text>
  <text x="640" y="206" font-size="11" fill="#fff" text-anchor="middle">registered in indexes</text>

  <!-- Mature v1.0 -->
  <rect x="790" y="140" width="200" height="80" rx="10" fill="#1E2A78" filter="url(#sh)"/>
  <text x="890" y="170" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Mature v1.0</text>
  <text x="890" y="190" font-size="11" fill="#C7D2FE" text-anchor="middle">stable contract</text>
  <text x="890" y="206" font-size="11" fill="#C7D2FE" text-anchor="middle">≥80% accept × 4w</text>

  <!-- Deprecated -->
  <rect x="1040" y="140" width="200" height="80" rx="10" fill="#FCE7F3" stroke="#7C3AED" stroke-width="2" filter="url(#sh)"/>
  <text x="1140" y="170" font-size="14" font-weight="700" fill="#7C3AED" text-anchor="middle">Deprecated</text>
  <text x="1140" y="190" font-size="11" fill="#0F172A" text-anchor="middle">replacement ships</text>
  <text x="1140" y="206" font-size="11" fill="#0F172A" text-anchor="middle">superseded_by: …</text>

  <!-- Auto-paused (below) -->
  <rect x="540" y="320" width="200" height="80" rx="10" fill="#FEF3C7" stroke="#DC2626" stroke-width="2" filter="url(#sh)"/>
  <text x="640" y="350" font-size="14" font-weight="700" fill="#DC2626" text-anchor="middle">⏸ Auto-paused</text>
  <text x="640" y="370" font-size="11" fill="#0F172A" text-anchor="middle">drift signal:</text>
  <text x="640" y="386" font-size="11" fill="#0F172A" text-anchor="middle">&lt;40% accept / 7d (DEC-055)</text>

  <!-- Manual fine-tune (below) -->
  <rect x="790" y="320" width="200" height="80" rx="10" fill="#7C3AED" filter="url(#sh)"/>
  <text x="890" y="350" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">👤 Manual fine-tune</text>
  <text x="890" y="370" font-size="11" fill="#DDD6FE" text-anchor="middle">7-step playbook</text>
  <text x="890" y="386" font-size="11" fill="#DDD6FE" text-anchor="middle">(see Part 7)</text>

  <!-- Auto-refinement loop -->
  <rect x="540" y="440" width="450" height="60" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="765" y="468" font-size="13" font-weight="700" fill="#B45309" text-anchor="middle">🧠 Auto-refinement (in-flight)</text>
  <text x="765" y="488" font-size="11" fill="#0F172A" text-anchor="middle">INV breach → refinement_proposal → human review → resume from checkpoint</text>

  <!-- Archived -->
  <rect x="1040" y="320" width="200" height="80" rx="10" fill="#fff" stroke="#64748B" stroke-width="2" filter="url(#sh)"/>
  <text x="1140" y="350" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">📦 Archived</text>
  <text x="1140" y="370" font-size="11" fill="#64748B" text-anchor="middle">moved to _archive/</text>
  <text x="1140" y="386" font-size="11" fill="#64748B" text-anchor="middle">soft-deleted (§4.6)</text>

  <!-- Arrows -->
  <g stroke="#0F172A" stroke-width="2" fill="none">
    <path d="M 240 180 L 290 180" marker-end="url(#arr)"/>
    <path d="M 490 180 L 540 180" marker-end="url(#arr)"/>
    <path d="M 740 180 L 790 180" marker-end="url(#arr)"/>
    <path d="M 990 180 L 1040 180" marker-end="url(#arr)"/>
    <!-- Active loop on itself -->
    <path d="M 640 140 Q 640 80 580 100 Q 540 120 540 160" marker-end="url(#arr)"/>
    <text x="540" y="95" font-size="10" fill="#64748B" font-style="italic">PATCH bumps</text>
    <!-- Mature loop on itself -->
    <path d="M 890 140 Q 890 80 830 100 Q 790 120 790 160" marker-end="url(#arr)"/>
    <text x="790" y="95" font-size="10" fill="#64748B" font-style="italic">MINOR/PATCH</text>
  </g>

  <!-- Active → Auto-paused -->
  <path d="M 600 220 L 600 320" stroke="#DC2626" stroke-width="2" fill="none" marker-end="url(#arrr)"/>
  <text x="555" y="270" font-size="10" fill="#DC2626" font-style="italic">drift</text>
  <!-- Auto-paused → Active -->
  <path d="M 680 320 L 680 220" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="688" y="275" font-size="10" fill="#10B981" font-style="italic">refined</text>

  <!-- Active → Manual fine-tune -->
  <path d="M 740 200 L 790 320" stroke="#7C3AED" stroke-width="2" fill="none" marker-end="url(#arrh)"/>
  <text x="785" y="265" font-size="10" fill="#7C3AED" font-style="italic">auto-ref escalation</text>
  <!-- Manual fine-tune → Mature/Active -->
  <path d="M 890 320 L 890 220" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Deprecated → Archived -->
  <path d="M 1140 220 L 1140 320" stroke="#7C3AED" stroke-width="2" fill="none" marker-end="url(#arrh)"/>
  <text x="1148" y="270" font-size="10" fill="#7C3AED" font-style="italic">v2 ≥ v1 acceptance</text>

  <!-- Phase gates -->
  <rect x="60" y="560" width="1180" height="200" rx="10" fill="#fff" stroke="#E2E8F0" filter="url(#sh)"/>
  <text x="80" y="588" font-size="14" font-weight="700" fill="#0F172A">Phase gates per PRD §14 — gated_until_phase: P&lt;n&gt;</text>
  <g font-size="12" fill="#0F172A">
    <text x="80" y="618" font-weight="700" fill="#10B981">P0 (Months 1-3, current):</text>
    <text x="280" y="618">cpo (this is what we're building today), cto (tech-spec drafting). All other personas are placeholder folders.</text>
    <text x="80" y="643" font-weight="700" fill="#F59E0B">P1 (Months 4-6):</text>
    <text x="220" y="643">ceo, coo, cfo, chro, cseco, clo, caio come online when HR / REW / TIME / CRM modules ship.</text>
    <text x="80" y="668" font-weight="700" fill="#1E2A78">P2 (Months 7-12):</text>
    <text x="225" y="668">cmo, cdo, cxo, cro per their dependent module readiness.</text>
    <text x="80" y="693" font-weight="700" fill="#7C3AED">P3+ (Year 2):</text>
    <text x="195" y="693">cso-sustainability + emergent personas as the C-level taxonomy expands.</text>
    <text x="80" y="730" font-weight="700" fill="#DC2626">Setting gated_until_phase: P&lt;n&gt; on a skill</text>
    <text x="345" y="730">means the supervisor returns E_PERSONA_GATED if a user tries to invoke it before P&lt;n&gt;.</text>
  </g>

  <text x="650" y="785" font-size="11" fill="#94A3B8" text-anchor="middle">10-skill-lifecycle-state.svg</text>
</svg>
