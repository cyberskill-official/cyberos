# CyberOS improvement-program manifest — the adapter the cyberos-improve-implement / -review skills read.
# See .claude/skills/cyberos/README.md for the schema. Replaces the old chat/PROMPT-IMPLEMENT.md +
# PROMPT-REVIEW.md; the shared loop now lives in the skills.

program: chat
report: docs/strategy/chat-enterprise-grade-plan-2026-07-06.md
report_refs: "C# items in the report; section 3 is the sync/protocol design (always read for protocol tasks)"

backlog:
  file: docs/improvement/chat/BACKLOG.md
  format: markdown-table
  status_field: status
  id_prefix: T

statuses:                 # this program's words -> canonical lifecycle
  ready: ready
  doing: in_progress
  review: review
  done: done
  blocked: blocked        # chat qualifies it: blocked:fork | blocked:input | blocked:decision

task_specs: docs/improvement/chat/tasks/phase-{phase}.md

branch:
  mode: one-per-program
  name: auto/chat-enterprise

commit_format: "chat: T-0NN <title> (C-refs)"

gates:
  environment: mac-gate
  commands:
    - cargo fmt --check
    - cargo clippy -- -D warnings           # touched crates
    - cargo test                            # touched crates; migrations applied on a throwaway DB
    - pnpm tsc && pnpm --filter apps/web build          # when apps/web is touched
    - pnpm --filter chat-core build                     # when packages/chat-core is touched
  notes: "Property/e2e suites are never marked skip; a flaky test is a task-level bug. New protocol surface (events, sync fields, ws frames) must match report section 3 naming."

ledger:
  mode: single-append
  path: docs/improvement/chat/LEDGER.md
  session_summary: docs/improvement/chat/notes/session-{date}.md
  review_packet: docs/improvement/chat/notes/review-packet-{date}.md

selection: "lowest phase first; within a phase the first task whose status is ready and whose depends are all done; never start a blocked:* task; never reorder phases"

guardrails:
  protected:
    - single-binary simplicity
    - per-tenant RLS
    - hash-chained audit
    - consent-gated capture
    - XSS-safe rich text
    - VN i18n — every user-facing string ships in EN and VI
    - protocol surface matches report section 3 naming; additions versioned, no silent break of old clients
    - migrations expand/contract (additive within a task)
  operator_only:
    - git push / deploy / release
    - prod env or prod DB access
    - secrets in code or logs
    - decision-gated work D1-D6 (untouched until BACKLOG.md shows the decision resolved)
  human_only_ids: [T-041, T-058, T-066]   # counsel; pen-test vendor + findings triage; D1-D6 verdicts
