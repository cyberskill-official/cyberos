# CyberOS improvement-program manifest — the adapter the cyberos-improve-implement / -review skills read.
# See .claude/skills/cyberos/README.md for the schema. This file replaces the old memory/PROMPT.md; the
# shared loop now lives in the skills, and only these program-specific values live here.

program: memory
report: docs/strategy/memory-enterprise-grade-and-auto-evolution-plan-2026-07-06.md
report_refs: "S# strengths, F# findings, R# recommendations in the report"

backlog:
  file: docs/improvement/memory/backlog.yaml
  format: yaml
  status_field: status
  id_prefix: MEM

statuses:                 # this program's words -> canonical lifecycle (ready|doing|review|done|blocked)
  ready: ready_to_implement
  doing: implementing
  review: in_review
  done: done
  blocked: blocked
  # extra: `superseded` (a task replaced by another) — treat as terminal, not eligible.

task_specs: docs/improvement/memory/tasks-phase-{phase}.md

branch:
  mode: one-per-program
  name: auto/memory-enterprise

commit_format: "MEM-0NN: <title>"

gates:
  environment: mac-gate   # sandbox has no cargo/docker + cannot git-write the mount; gate on the operator's Mac
  commands:
    - cargo fmt -p cyberos-memory -- --check
    - cargo clippy -p cyberos-memory --all-targets -- -D warnings
    - cargo test -p cyberos-memory
    - "# DB-backed brain tests: docker compose up -d in services/dev, then DATABASE_URL=... cargo test -p cyberos-memory -- --ignored"
    - "python -m pytest   # only when modules/memory was touched"
  notes: "The dev Postgres user is a SUPERUSER and bypasses RLS — RLS assertions must run under a non-superuser probe role (see tests/brain_rls_test.rs)."

ledger:
  mode: per-session-file
  path: docs/auto-work/{date}-memory-{n}.md
  session_summary: docs/auto-work/{date}-memory-session-summary.md

selection: "lowest phase (P0<P1<P2<P3) -> priority (critical>high>medium>low) -> lowest id; a task is eligible only when status is ready_to_implement and every dep is done"

guardrails:
  protected:
    - RLS fail-closed (no unset-GUC / nil-uuid bypass)
    - deny-by-default per-subject access (DEC-2722)
    - consent default-deny capture (DEC-2702)
    - DEC-2701 content_ref never stores raw bodies
    - DEC-2721 Layer-1 (hash chain) wins on any conflict
    - DEC-2723 embeddings/summaries only via the ai-gateway
  operator_only:
    - git push / deploy / merge
    - destructive migration on shared/staging/prod data
    - secrets / KMS keys / PDPL (DPIA, CTIA) filings
  human_only_ids: []   # MEM-041 PDPL filing is operator-run, but the task itself is agent-prepared
