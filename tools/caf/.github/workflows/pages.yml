name: pages

# Deploys the community page — and ONLY it. The site/ folder is the artifact;
# fixtures, protocol internals and eval machinery never reach the web server.
# (Replaces the legacy branch build, which ran Jekyll over the whole repo and
# choked on the deliberately-invalid-UTF-8 eval fixture.)

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# CyberSkill standard: Node >= 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7  # v4

      - uses: actions/configure-pages@v5  # v5

      - uses: actions/upload-pages-artifact@v4  # v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4  # v4
