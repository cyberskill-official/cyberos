narrative: >
  First live runner-mode field run, and the loop behaved as designed. Phase 0–2
  produced a gated BACKLOG with 1 Critical + 6 High findings (full circle: this
  is the original Qi Men app that seeded the R2 honest-targets lesson, and the
  profile correctly carries BENCHMARK_MODE=none so every target is INTERNAL — no
  fabricated SOTA this time). Two signals worth the pilot:
  (1) The framework's own validator REJECTED the first BACKLOG draft with
  R1-UNLINKED-OUTPUT — a real traceability defect (the "core calc modules" verify
  command differed between table cell and fenced $-line). A true positive; the
  gate caught a non-conformant artifact before it reached the human. Fixed by
  aligning the command; re-validated CLEAN. Counts as artifact hygiene, not a
  validator false positive.
  (2) The report JSON dropped protocol provenance in runner mode
  (protocol_version: null despite the artifact echoing v1.3.0) — a genuine
  framework gap the runner-mode feature exposed on its first real use. Fixed in
  the framework same run (commit 493ef18: build_report falls back to the loop's
  Protocol echo; CI now asserts it). The report referenced here was regenerated
  post-fix and carries v1.3.0.
  PHASE 3 EXECUTED in two passes (2026-06-12, maintainer approved all 7).
  FINAL: 6 DONE (L1-T1…T6), 1 BLOCKED (L1-T7). Suite 212→236 (+24 audit tests),
  all green; re-validated CLEAN.
  - Pass 1 (no extra inputs needed): L1-T3 build fix (a1af217), L1-T5 cache
    time-correctness (07a2726).
  - Maintainer then supplied the 5 decisions the BLOCKED tasks were waiting on,
    and pass 2 cleared four of them:
      L1-T1 anonymized public /history projection (bd1264d);
      L1-T2 Supabase-JWT auth + fail-closed 503 + public rate-limit (8d977a4);
      L1-T4 non-blocking Gemini via run_in_executor + the probe harness that the
            original verify named but didn't exist — built it (dbfa775);
      L1-T6 invariant/UNIVERSAL-law tests for all 7 calc modules, NO fabricated
            school-specific values (the whole ethos held under pressure) (2794cf7).
  - L1-T7 stays BLOCKED honestly: env-driven engine committed (92a2ed0, Postgres
    one env var away), but the durability round-trip needs prod Supabase
    DATABASE_URL + asyncpg (no greenlet locally) — a secret only the maintainer
    can set. Good signal: the protocol let me ship the enabling change while
    keeping the unverifiable delta BLOCKED rather than claiming it.
  - All commits LOCAL to kymondongiap, not pushed (client deploy = maintainer's).

  Framework true-positives caught on MY OWN execution artifacts (the gate audits
  the auditor) — across both the initial and the close-out passes:
  (1) HANDOFF metrics table had bare targets ("0 failures") → R2-UNCITED, and a
      lint row I didn't re-run → R1-UNLINKED. Fixed (INTERNAL labels; dropped the
      unmeasured row). Correct catches.
  (2) Framework-robustness CANDIDATE (1st observation, NOT promoted): I wrote
      "Approved: all 7." as prose in the execution-results section; check_approvals
      takes the FIRST `^Approved:` match, so the prose shadowed the real gate line
      and every task flagged GATED-UNAPPROVED-EXEC. Defensible behavior (ambiguous
      artifact) but brittle UX. Candidate: anchor approval parse to the gate
      section / last match, or require approved tokens to look like IDs. Logged
      for Rule-of-Three; fixed my artifact rather than the framework this cycle.
      (Not re-triggered in the close-out pass — I avoided the prose-shadow trap,
      so it stays at 1 observation, not promoted.)
  (3) Close-out pass: my updated HANDOFF wrote "Stop condition: Phase 4 (c)",
      which pushed the (c) marker out of the position P5 anchors on →
      P5-NO-STOP-REASON. A correct catch; reworded to "Stop condition: (c)" and
      re-validated CLEAN. Reinforces that the gate reliably audits the auditor's
      own artifacts on every pass, not just the first.

  T7 CUTOVER-READINESS (2026-06-12, commits 92a2ed0 + bfedf2f + b71b14f): maintainer
  supplied the Supabase DATABASE_URL to unblock T7. Two real gaps caught before they
  could bite prod: (a) the pasted string was the plain `postgresql://` dashboard form,
  which would have crashed the async engine on boot (needs +asyncpg) — added scheme
  normalization + async/sync driver coercion so one URL drives both engines; (b) none
  of the required drivers (asyncpg, psycopg2-binary, greenlet) were installed — added
  them. Durability now proven on-disk (write→dispose→fresh-engine→read, no greenlet)
  + a gated live-Postgres prod-parity test (write sync / read async) that stays skipped
  until KYMON_PG_TEST_URL is set. Suite 236→240 (+1 gated skip). T7 stays BLOCKED on
  prod-verify only: prod keeps ephemeral SQLite until the env var is set in Cloud Run,
  and the Postgres round-trip needs the secret (correctly NOT taken into chat/repo).
  Honest-status signal: even with the decision + secret in hand, the agent did not
  flip T7 to DONE because it cannot itself verify the prod Postgres delta — code
  complete ≠ delta verified.

  T7 NOW DONE — LIVE-VERIFIED (2026-06-12, commits 9a9a94c + bb1d739): maintainer
  then supplied the DB password, authorizing actual verification. Probing surfaced
  TWO more real cutover blockers the agent found and fixed before they bit prod:
  (a) the direct host `db.<ref>.supabase.co` is IPv6-only (unreachable from the Mac
  and from typical Cloud Run IPv4 egress) — the project lives on the newer `aws-1`
  Supavisor pooler (Singapore), user `postgres.<ref>`; (b) Supabase requires SSL and
  asyncpg does not enable it by default, so the connection is refused without explicit
  SSL — added per-engine SSL connect_args (encrypt-by-default 'require', opt-in
  verify via DB_SSL_ROOT_CERT). Then ran the gated round-trip against the LIVE DB
  (Supabase PostgreSQL 17.6): write via the sync logger path → dispose → read via a
  fresh async engine → row present. Cleaned up: the transient `xaiauditlog` table the
  test created was dropped, leaving prod pristine. Loop 1 = 7/7 DONE; nothing BLOCKED.
  Secret hygiene: the DB password transited chat — flagged to the maintainer to rotate;
  NOT stored in memory, code, docs, or field-data; passed to tooling via env only.
  Process signal: the auditor closing T7 required THREE rounds of real-environment
  debugging (driver coercion → drivers+SSL → pooler topology) that no static review
  would have surfaced — argues for a "live-connectivity smoke" step in the protocol's
  infra/architecture vector when a managed datastore is in scope.
