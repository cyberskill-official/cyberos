name: "CyberOS FR gates"
description: "Run the FR machine-gate floor (build, lint, test, coverage; plus caf/awh if enabled) on a repo that has the FR pack installed."
runs:
  using: composite
  steps:
    - name: Run FR machine gates
      shell: bash
      run: |
        if [ ! -f .cyberos/fr.gates.env ]; then
          echo "::error::.cyberos/fr.gates.env not found. Run the FR pack init.sh in this repo first." ; exit 2
        fi
        bash .cyberos/fr-pack/gates/run-gates.sh
    - name: Note on HITL
      shell: bash
      run: |
        echo "::notice::Machine gates only. Final acceptance (testing -> done) is a human verdict and is NOT performed in CI."
