name: "CyberOS task gates"
description: "Run the CyberOS machine-gate floor (build, lint, test, coverage; plus caf/awh if enabled) on a repo that has the CyberOS payload installed."
runs:
  using: composite
  steps:
    - name: Run task machine gates
      shell: bash
      run: |
        if [ ! -f .cyberos/gates.env ]; then
          echo "::error::.cyberos/gates.env not found. Run the CyberOS payload install.sh in this repo first." ; exit 2
        fi
        bash .cyberos/cuo/gates/run-gates.sh
    - name: Note on HITL
      shell: bash
      run: |
        echo "::notice::Machine gates only. Final acceptance (testing -> done) is a human verdict and is NOT performed in CI."
