# lefthook.yml — pre-commit hooks for CyberOS.
#
# Runs validators that are cheap enough for every commit. Heavier checks
# (build, full test suite) live in CI to avoid slowing engineers down.

pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm turbo typecheck --filter=...{staged_files}
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm turbo lint --filter=...{staged_files}
    validate-fr:
      glob: "docs/feature-requests/**/*.md"
      run: pnpm validate:fr
    validate-yaml:
      glob: "docs/roadmap/tasks.yaml"
      run: pnpm validate:yaml
    validate-modules:
      glob: "modules.yaml"
      run: pnpm validate:modules

commit-msg:
  commands:
    conventional-commits:
      run: |
        # Conventional Commits: type(scope): subject
        # Types: feat, fix, docs, refactor, perf, test, build, ci, chore, revert
        grep -qE '^(feat|fix|docs|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?: .{1,72}$' {1} || {
          echo "✗ commit message must follow Conventional Commits"
          echo "  format: type(scope): subject"
          echo "  example: feat(auth): add WebAuthn passkey support (FR-AUTH-015)"
          exit 1
        }

pre-push:
  commands:
    test-changed:
      run: pnpm turbo test --filter=...HEAD~1
