apiVersion: 1

# CyberOS observability datasources (TASK-OBS-002).
#
# Every datasource points at obs-proxy, never at a backend directly, so Grafana can only reach Loki /
# Prometheus / Tempo through the tenant-isolation proxy. The proxy AST-injects the caller's tenant_id
# into each query, so a tenant cannot read another tenant's telemetry. The tenant JWT (RS256, signed by
# the auth service / TASK-AUTH-004) travels as the Authorization header.
#
# The URL is the proxy root for all three: Grafana appends the backend's own path (/api/v1/... for
# Prometheus, /loki/api/v1/... for Loki, /api/search + /api/traces for Tempo), which is exactly what the
# proxy's detect_backend routes on.
datasources:
  - name: CyberOS-Prometheus
    type: prometheus
    uid: cyberos-prometheus
    access: proxy
    url: http://obs-proxy:8088
    isDefault: true
    jsonData:
      # Prometheus queries POST by default; the proxy reads the query from the form body for POST.
      httpMethod: POST
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: "Bearer ${OBS_TENANT_TOKEN}"

  - name: CyberOS-Loki
    type: loki
    uid: cyberos-loki
    access: proxy
    url: http://obs-proxy:8088
    jsonData:
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: "Bearer ${OBS_TENANT_TOKEN}"

  - name: CyberOS-Tempo
    type: tempo
    uid: cyberos-tempo
    access: proxy
    url: http://obs-proxy:8088
    jsonData:
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: "Bearer ${OBS_TENANT_TOKEN}"
