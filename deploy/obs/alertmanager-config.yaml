global:
  resolve_timeout: 5m

route:
  receiver: cyberos-obs-router
  group_by: ["alertname", "tenant_id", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 30m

receivers:
  - name: cyberos-obs-router
    webhook_configs:
      - url: http://obs-router:7777/alert
        send_resolved: true
        http_config:
          authorization:
            type: X-CyberOS-Webhook-Secret
            credentials_file: /etc/alertmanager/webhook.secret
