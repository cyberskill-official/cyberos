# Minimal Prometheus config for the local obs stack. Scrapes only itself; real scrape targets and the
# OTLP write path arrive with the collector wiring (FR-OBS-001).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
