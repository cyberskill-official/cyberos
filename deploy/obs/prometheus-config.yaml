global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cyberos-obs-ingress
    metrics_path: /metrics
    static_configs:
      - targets: ["ingress:4318"]
        labels:
          service: cyberos-obs-ingress

  - job_name: otel-collector
    static_configs:
      - targets: ["collector:8888"]
        labels:
          service: otel-collector

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
