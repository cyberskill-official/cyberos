global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: cyberos-obs-ingress
    metrics_path: /metrics
    static_configs:
      - targets: ["ingress:4318"]
        labels:
          service: cyberos-obs-ingress

  - job_name: otel-collector
    static_configs:
      - targets: ["collector:8888"]
        labels:
          service: otel-collector

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  - job_name: obs-router
    metrics_path: /metrics
    static_configs:
      - targets: ["obs-router:7777"]
        labels:
          service: obs-router

  - job_name: obs-compliance-view
    metrics_path: /metrics
    static_configs:
      - targets: ["obs-compliance-view:7788"]
        labels:
          service: obs-compliance-view
