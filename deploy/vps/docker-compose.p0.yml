# CyberOS P0 stack - the smallest deploy that lets a team log in with Google and do daily chat, DMs, and
# file sharing on one origin. Three services: cyberos-auth, cyberos-chat (native Rust), and Caddy (TLS +
# single-origin router serving the static console). The database is Supabase (managed Postgres) - auth
# and chat connect to it over their AUTH_DATABASE_URL / CHAT_DATABASE_URL, so there is no Postgres
# container here and nothing stateful to back up on the VPS.
#
#   cd deploy/vps && cp .env.p0.example .env.p0   # then edit .env.p0 on the host
#   docker compose --env-file .env.p0 -f docker-compose.p0.yml up -d --build
#
# Build context for the Rust services is ../../services so the whole Cargo workspace is in scope. The
# Google client id/secret are NOT here - they are stored in the IdP config row created via the admin API
# (runbook Step 4), so secrets never live in this file. The Supabase password lives only in .env.p0
# (gitignored), inside the two connection strings.

name: ${COMPOSE_PROJECT_NAME:-cyberos-p0}

networks:
  cyberos:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  # Chat attachment payloads (CHAT_ATTACHMENT_STORE=fs) - survives redeploys; include in VPS backups.
  chat-attachments:
  # Hugging Face cache for the embed sidecar - bge-m3 (~2.3 GB) downloads once and survives redeploys.
  embed-hf-cache:
  # Ollama model store (llm profile only).
  ollama-models:

services:
  auth:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        RUST_VERSION: ${CYBEROS_RUST_VERSION:-1.88.0}
        PACKAGE: cyberos-auth
        BIN: cyberos-auth
    image: cyberos-auth:${CYBEROS_IMAGE_TAG:-local}
    restart: unless-stopped
    env_file: [.env.p0]
    environment:
      AUTH_LISTEN_ADDR: 0.0.0.0:7700
      DATABASE_URL: ${AUTH_DATABASE_URL}
      AUTH_JWT_ISSUER: ${CYBEROS_APP_URL}
      # Allow the OIDC hand-back to return the token to the product origin (oidc.rs return_to gate). The
      # gate is a comma-separated PREFIX match, so each entry is a prefix and not a whole URL.
      # The second entry is the mobile apps. A Capacitor build cannot use the web origin: its own origin is
      # capacitor://localhost (iOS) / http://localhost (Android), and the Google consent screen runs in an
      # external browser that cannot redirect into another app's private scheme. It hands back to the custom
      # scheme instead, which the OS routes to the app. Without this entry the server answers
      # return_to_not_allowed and Google sign-in is impossible on mobile - which it was, on every build up to
      # and including 1.0.3, for what is the PRIMARY sign-in button.
      # Must match CFBundleURLSchemes (iOS), the Android intent-filter, and NATIVE_RETURN_TO in
      # apps/web/src/lib/auth.tsx.
      AUTH_OIDC_RETURN_ALLOW: ${CYBEROS_APP_URL}/,os.cyberskill.world://
      # AUTH_DEV_CORS intentionally unset - single origin needs no CORS.
      # DATABASE_URL points at Supabase (set in .env.p0); no local DB dependency to wait on.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7700/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [cyberos]

  # SINGLE REPLICA ONLY. The realtime Hub, Notifier, and Presence are in-process (per-container), so running a
  # second chat instance would split-brain: cross-instance messages, typing, and presence would not be
  # delivered. Do NOT add `deploy.replicas` or `docker compose up --scale chat=N` until fan-out moves to Redis
  # (or Postgres LISTEN/NOTIFY) pub/sub with a shared presence set. See CHAT-DEEP-AUDIT-2026-07-03.md.
  chat:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        RUST_VERSION: ${CYBEROS_RUST_VERSION:-1.88.0}
        PACKAGE: cyberos-chat
        BIN: cyberos-chat
    image: cyberos-chat:${CYBEROS_IMAGE_TAG:-local}
    restart: unless-stopped
    env_file: [.env.p0]
    environment:
      CHAT_LISTEN_ADDR: 0.0.0.0:7720
      DATABASE_URL: ${CHAT_DATABASE_URL}
      # Chat verifies CyberOS tokens against auth's JWKS over the internal network (no public round trip).
      CHAT_AUTH_JWKS_URL: http://auth:7700/.well-known/jwks.json
      # DEC-2713 — the chat->brain audit link; point at the memory DB to chain chat audit rows +
      # interaction-events. Unset = chat logs events instead of chaining them.
      CHAT_AUDIT_DATABASE_URL: ${CHAT_AUDIT_DATABASE_URL:-}
      # TASK-MEMORY-122 master switch (default OFF). Capture emits interaction-events only when this is true
      # AND the subject has acknowledged the monitoring notice. Default-off = no behaviour change.
      CAPTURE_ENABLED: ${CAPTURE_ENABLED:-false}
      # Chat translate + future AI features call the gateway over the internal network. Unset = clean 502
      # from /v1/chat/translate; the gateway being down degrades the same way, never breaking chat itself.
      AI_GATEWAY_URL: http://ai-gateway:8080
      # Attachment bytes live on the VPS volume (richer-messages cluster), not in Supabase - larger cap, no
      # blob weight in Postgres. Metadata stays in chat_attachments; pre-existing 'db' rows keep serving.
      CHAT_ATTACHMENT_STORE: fs
      CHAT_ATTACHMENT_FS_DIR: /data/chat-attachments
      CHAT_ATTACHMENT_MAX_BYTES: "52428800" # 50 MB per file
      # CHAT_DEV_CORS intentionally unset - single origin needs no CORS.
      # DATABASE_URL points at Supabase (set in .env.p0).
    volumes:
      - chat-attachments:/data/chat-attachments
    depends_on:
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7720/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [cyberos]

  # BRAIN/EVAL governance service (TASK-EVAL-001), built from the same Cargo workspace. Independent of the
  # live stack. Reads EVAL_DATABASE_URL (Supabase, in .env.p0); apply
  # services/eval/migrations/0001_governance.sql before it does real work (healthz only needs a connection).
  eval:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        RUST_VERSION: ${CYBEROS_RUST_VERSION:-1.88.0}
        PACKAGE: cyberos-eval
        BIN: cyberos-eval
    image: cyberos-eval:${CYBEROS_IMAGE_TAG:-local}
    restart: unless-stopped
    env_file: [.env.p0]
    environment:
      EVAL_LISTEN_ADDR: 0.0.0.0:7760
      EVAL_DATABASE_URL: ${EVAL_DATABASE_URL}
      EVAL_AUDIT_DATABASE_URL: ${EVAL_AUDIT_DATABASE_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7760/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [cyberos]

  # MEMORY / BRAIN (TASK-MEMORY-123). Build-from-source twin of the images-compose memory service; OFF by
  # default, deploy-gated behind DEPLOY_MEMORY=1 (see deploy.sh). Recall + ingestion over l1_audit_log +
  # pgvector; embeds via the bge-m3 sidecar at embed:7900. Running it records nothing on its own - capture is
  # governed by the chat->brain link + the consent gate.
  memory:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        RUST_VERSION: ${CYBEROS_RUST_VERSION:-1.88.0}
        PACKAGE: cyberos-memory
        BIN: cyberos-memory
    image: cyberos-memory:${CYBEROS_IMAGE_TAG:-local}
    restart: unless-stopped
    env_file: [.env.p0]
    environment:
      MEMORY_LISTEN_ADDR: 0.0.0.0:7800
      DATABASE_URL: ${MEMORY_DATABASE_URL:-}
      MEMORY_EMBED_URL: ${MEMORY_EMBED_URL:-http://embed:7900}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7800/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [cyberos]

  # AI group (TASK-MEMORY-123 / DEC-2723) - best-effort like eval: nothing in the core stack depends on any
  # of these, so a failed build or boot never touches auth/chat/caddy. The gateway is INTERNAL ONLY (no
  # Caddy /v1 route; chat reaches it over the compose network); only its /healthz is probed via /status/ai.
  ai-gateway:
    build:
      context: ../../services
      dockerfile: Dockerfile
      args:
        RUST_VERSION: ${CYBEROS_RUST_VERSION:-1.88.0}
        PACKAGE: cyberos-ai-gateway
        BIN: cyberos-gateway
    image: cyberos-ai-gateway:${CYBEROS_IMAGE_TAG:-local}
    restart: unless-stopped
    # No env_file: the gateway needs no secrets or DB - least privilege.
    environment:
      AI_GATEWAY_BIND: 0.0.0.0:8080
      AI_GATEWAY_CONFIG_DIR: /etc/cyberos/tenants
      # local_openai adapter -> the bge-m3 sidecar (embed.standard in the tenant policy).
      OPENAI_COMPAT_ENDPOINT: http://embed:7900
      # ollama adapter -> the chat LLM (chat.smart / chat.fast). Down = clean per-call 502. Defaults to the
      # in-compose ollama (profile "llm"); OVERRIDE to a remote box by setting OLLAMA_ENDPOINT in .env.p0 to
      # its private URL, e.g. OLLAMA_ENDPOINT=http://10.x.x.x:11434 over a Vultr VPC. See
      # docs/deploy/remote-llm-vultr.md. Keep the provider kind=ollama so the ZDR/residency/cost gates hold.
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://ollama:11434}
    volumes:
      - ./ai/tenants:/etc/cyberos/tenants:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [cyberos]

  # bge-m3 embeddings (TASK-AI-019). Weights download once into embed-hf-cache at first boot (warmup thread;
  # /healthz reports warm: cold|warming|ready|failed). The memory cap keeps a runaway load inside this
  # container - the kernel OOM-kills embed alone and Docker restarts it, auth/chat untouched. memswap gives
  # fp32 bge-m3 room to lean on the VPS swapfile on the 4 GB box.
  embed:
    build:
      context: ../../services/embed-sidecar
      dockerfile: Dockerfile
    image: cyberos-embed-sidecar:${CYBEROS_IMAGE_TAG:-local}
    restart: unless-stopped
    environment:
      CYBEROS_EMBED_MODE: real
      CYBEROS_EMBED_WARMUP: "1"
    volumes:
      - embed-hf-cache:/data
    mem_limit: 3g
    memswap_limit: 6g
    healthcheck:
      # python:slim has no curl; ask the interpreter instead.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7900/healthz', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [cyberos]

  # Chat LLM for translation/assistant - OFF by default (compose profile "llm"): a 3b model does not fit
  # next to bge-m3 in 3.3 GiB RAM. Enable after the VPS resize: deploy with DEPLOY_LLM=1 (deploy.sh sets
  # COMPOSE_PROFILES=llm and runs the idempotent model pull). Runbook: docs/deploy/ai-gateway-and-embeddings.md.
  ollama:
    # Not pinned yet on purpose: the llm profile is OFF today, so this pulls nothing. Pin to the exact tag
    # that the first successful flip-on pulls (docker inspect --format '{{index .RepoDigests 0}}' ...).
    image: ollama/ollama:latest
    profiles: [llm]
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    mem_limit: 3500m
    healthcheck:
      test: ["CMD", "ollama", "ls"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [cyberos]

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CYBEROS_APP_DOMAIN: ${CYBEROS_APP_DOMAIN}
    volumes:
      - ./Caddyfile.p0:/etc/caddy/Caddyfile:ro
      - ../../apps/console:/srv/console:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - auth
      - chat
    networks: [cyberos]
