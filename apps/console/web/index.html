<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover is REQUIRED for env(safe-area-inset-*) to resolve to anything but 0. Without it
         every safe-area rule in styles.css is dead code, which is why the padding and this attribute have
         to ship together. iOS draws the webview under the notch and home indicator; Android 15+
         (targetSdk 35+) enforces the same edge-to-edge behaviour with no opt-out. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e0f08" />
    <link rel="icon" href="/cyberskill-logo.svg" type="image/svg+xml" />
    <title>CyberOS</title>
    <script>
      // Apply the theme before first paint (stored choice, else the OS preference) so there is no flash.
      // lib/theme.ts keeps this in sync afterwards.
      try {
        var t = localStorage.getItem("cyberos.theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CyberOS" />
    <script type="module" crossorigin src="/assets/index-CdmOm6ir.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Drw3LcFV.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
