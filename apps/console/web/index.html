<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    />
    <title>CyberOS</title>
    <script>
      // Apply the theme before first paint (stored choice, else the OS preference) so there is no flash.
      // lib/theme.ts keeps this in sync afterwards.
      try {
        var t = localStorage.getItem("cyberos.theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <link rel="manifest" href="/web/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/web/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="CyberOS" />

    <link rel="stylesheet" crossorigin href="/web/assets/index-nuc2yaHl.css">
  </head>

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {

        });
      }
    </script>
  </body>
</html>
