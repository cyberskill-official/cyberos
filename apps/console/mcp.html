<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CyberOS MCP Registry</title>
<!--
  FR-APP-004 - CyberOS MCP Registry & Tools panel.

  A self-contained operator page that lists the tools the MCP gateway is currently serving, by calling the
  gateway's own protocol surface (POST /mcp, JSON-RPC method "tools/list"). It adds no backend. Each tool a
  module self-registers (FR-MCP-002) appears here live; nothing is hard-coded.

  Run: serve this folder and start the gateway with MCP_DEV_CORS=1 (and MCP_DEV_REGISTRATION=1 so a module can
  register) plus at least one module. In production Caddy serves the page and proxies the gateway under one
  origin, so the dev CORS flag stays off.
-->
<style>
  :root {
    --cds-umber: #45210E; --cds-ochre: #F4BA17; --cds-umber-700: #5a2e16; --cds-umber-900: #2c1409;
    --cds-ink: #f6ecdd; --cds-muted: #c9b79f; --cds-ok: #6fbf73; --cds-bad: #e1654f; --cds-radius: 10px;
    --cds-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --cds-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: var(--cds-font); background: var(--cds-umber-900); color: var(--cds-ink); display: flex; flex-direction: column; }
  header { background: var(--cds-umber); border-bottom: 2px solid var(--cds-ochre); padding: 14px 20px; display: flex; align-items: baseline; gap: 14px; }
  header .wordmark { font-weight: 800; font-size: 20px; letter-spacing: 0.5px; }
  header .wordmark .cyber { color: var(--cds-ink); }
  header .wordmark .os { color: var(--cds-ochre); }
  header .slogan { color: var(--cds-muted); font-size: 13px; font-style: italic; }
  header .spacer { flex: 1; }
  header .health { font-size: 12px; color: var(--cds-muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--cds-muted); display: inline-block; }
  .dot.ok { background: var(--cds-ok); } .dot.bad { background: var(--cds-bad); }

  .config { background: var(--cds-umber-700); padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; border-bottom: 1px solid var(--cds-umber); }
  .config label { font-size: 12px; color: var(--cds-muted); display: flex; flex-direction: column; gap: 3px; }
  .config input { background: var(--cds-umber-900); border: 1px solid var(--cds-umber); color: var(--cds-ink); border-radius: 6px; padding: 6px 8px; font-size: 13px; min-width: 240px; }
  .config button { background: var(--cds-ochre); color: var(--cds-umber-900); border: none; border-radius: 6px; padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer; }

  main { flex: 1; overflow: auto; padding: 16px 20px; }
  .summary { color: var(--cds-muted); font-size: 13px; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .tool { background: var(--cds-umber); border: 1px solid var(--cds-umber-700); border-radius: var(--cds-radius); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .tool .name { font-family: var(--cds-mono); font-size: 14px; color: var(--cds-ochre); font-weight: 700; word-break: break-all; }
  .tool .mod { align-self: flex-start; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; background: var(--cds-umber-900); color: var(--cds-muted); padding: 2px 7px; border-radius: 10px; }
  .tool .desc { font-size: 13px; line-height: 1.45; color: var(--cds-ink); }
  .tool .params { font-size: 12px; color: var(--cds-muted); }
  .tool .params b { color: var(--cds-ink); font-weight: 600; }
  .tool .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .badge { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 10px; }
  .badge.ro { background: var(--cds-umber-700); color: var(--cds-muted); }
  .badge.destructive { background: var(--cds-bad); color: var(--cds-umber-900); font-weight: 700; }
  .empty { color: var(--cds-muted); font-style: italic; padding: 20px 0; }
</style>
</head>
<body>
  <header>
    <span class="wordmark"><span class="cyber">Cyber</span><span class="os">OS</span></span>
    <span class="slogan">Turn Your Will Into Real</span>
    <a href="app.html" style="color:var(--cds-ochre);text-decoration:none;font-size:13px;">&larr; Dashboard</a>
    <span class="spacer"></span>
    <span class="health"><span id="health-dot" class="dot"></span><span id="health-text">checking gateway...</span></span>
  </header>

  <div class="config">
    <label>MCP gateway URL<input id="cfg-gw" value="http://127.0.0.1:7730" spellcheck="false" /></label>
    <button id="cfg-load" type="button">Load tools</button>
  </div>

  <main>
    <div class="summary" id="summary">Connect to the gateway to list its registered tools.</div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">The gateway is reachable but lists no tools. Register a module (FR-MCP-002) to populate it.</div>
  </main>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function gwUrl() { return $("cfg-gw").value.replace(/\/+$/, ""); }
  function token() { try { return localStorage.getItem("cyberos_chat_token") || ""; } catch (e) { return ""; } }

  function moduleOf(name) { var i = name.lastIndexOf("."); return i > 0 ? name.slice(0, i) : "tool"; }
  function paramsOf(tool) {
    var s = tool.inputSchema || tool.input_schema;
    if (s && s.properties) { var k = Object.keys(s.properties); return k.length ? k.join(", ") : "none"; }
    return "none";
  }

  async function checkHealth() {
    try { var res = await fetch(gwUrl() + "/mcp/healthz"); $("health-dot").className = res.ok ? "dot ok" : "dot bad"; $("health-text").textContent = res.ok ? "gateway reachable" : "gateway error"; }
    catch (e) { $("health-dot").className = "dot bad"; $("health-text").textContent = "gateway unreachable"; }
  }

  function renderTools(tools) {
    var grid = $("grid"); grid.innerHTML = "";
    tools.forEach(function (t) {
      var ann = t.annotations || {};
      var card = document.createElement("div");
      card.className = "tool";
      var badges = "";
      if (ann.readOnlyHint) badges += '<span class="badge ro">read-only</span>';
      if (ann.destructiveHint) badges += '<span class="badge destructive">destructive</span>';
      if (ann.idempotentHint) badges += '<span class="badge ro">idempotent</span>';
      card.innerHTML =
        '<span class="mod">' + moduleOf(t.name) + '</span>' +
        '<div class="name">' + t.name + '</div>' +
        '<div class="desc">' + (t.description || (ann.title || "")) + '</div>' +
        '<div class="params">params: <b>' + paramsOf(t) + '</b></div>' +
        (badges ? '<div class="badges">' + badges + '</div>' : '');
      grid.appendChild(card);
    });
  }

  async function load() {
    var headers = { "content-type": "application/json" };
    var tk = token(); if (tk) headers["Authorization"] = "Bearer " + tk;
    var tools;
    try {
      var res = await fetch(gwUrl() + "/mcp", { method: "POST", headers: headers, body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "tools/list" }) });
      var data = await res.json();
      if (data && data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      tools = (data && data.result && data.result.tools) || [];
    } catch (e) { $("summary").textContent = "could not list tools: " + e.message + " (is the gateway running with MCP_DEV_CORS=1?)"; return; }
    renderTools(tools);
    $("summary").textContent = tools.length + " tool(s) the gateway is serving right now, across " + new Set(tools.map(function (t) { return moduleOf(t.name); })).size + " module(s).";
    $("empty").style.display = tools.length ? "none" : "block";
  }

  $("cfg-load").onclick = load;
  try { var g = localStorage.getItem("cyberos_mcp_gw"); if (g) $("cfg-gw").value = g; } catch (e) {}
  $("cfg-gw").addEventListener("change", function () { try { localStorage.setItem("cyberos_mcp_gw", gwUrl()); } catch (e) {} });
  checkHealth();
  setInterval(checkHealth, 5000);
  load();
})();
</script>
</body>
</html>
