<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CyberOS</title>
<!--
  TASK-APP-001 shell - the auth-gated CyberOS operator console: login, then a dashboard of modules.

  Flow: login (password grant against cyberos-auth, TASK-AUTH-004) -> dashboard -> pick a module. The
  access token is stored client-side and handed to each module. The Chat tile opens the chat client
  (apps/console/chat.html, TASK-APP-007), which auto-connects from the stored token; the chat service
  verifies that token against the auth JWKS. No backend of its own.

  Run: serve this folder and open app.html. Auth on :7700, chat on :7720 (started with CHAT_DEV_CORS=1
  for local cross-origin). In production Caddy serves the page and proxies the services under one origin.
-->
<style>
  :root {
    --cds-umber: #45210E; --cds-ochre: #F4BA17; --cds-umber-700: #5a2e16; --cds-umber-900: #2c1409;
    --cds-ink: #f6ecdd; --cds-muted: #c9b79f; --cds-ok: #6fbf73; --cds-bad: #e1654f; --cds-radius: 10px;
    --cds-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: var(--cds-font); background: var(--cds-umber-900); color: var(--cds-ink); display: flex; flex-direction: column; min-height: 100%; }
  header { background: var(--cds-umber); border-bottom: 2px solid var(--cds-ochre); padding: 14px 20px; display: flex; align-items: baseline; gap: 14px; }
  header .wordmark { font-weight: 800; font-size: 20px; letter-spacing: 0.5px; }
  header .wordmark .cyber { color: var(--cds-ink); }
  header .wordmark .os { color: var(--cds-ochre); }
  header .slogan { color: var(--cds-muted); font-size: 13px; font-style: italic; }
  header .spacer { flex: 1; }
  header .who { font-size: 13px; color: var(--cds-muted); }
  header button.logout { background: transparent; color: var(--cds-ochre); border: 1px solid var(--cds-umber-700); border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }

  .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px; }
  .card { background: var(--cds-umber); border: 1px solid var(--cds-umber-700); border-radius: var(--cds-radius); padding: 28px; width: 380px; max-width: 100%; }
  .card h1 { margin: 0 0 4px; font-size: 22px; }
  .card .sub { color: var(--cds-muted); font-size: 13px; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--cds-muted); }
  .field input { background: var(--cds-umber-900); border: 1px solid var(--cds-umber-700); color: var(--cds-ink); border-radius: 6px; padding: 10px; font-size: 14px; }
  .card button.primary { width: 100%; background: var(--cds-ochre); color: var(--cds-umber-900); border: none; border-radius: 8px; padding: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 4px; }
  .card button.primary:disabled { opacity: 0.5; cursor: default; }
  .err { color: var(--cds-bad); font-size: 13px; min-height: 18px; margin-top: 8px; }
  .advanced { margin-top: 16px; font-size: 12px; color: var(--cds-muted); }
  .advanced summary { cursor: pointer; }
  .advanced input { width: 100%; background: var(--cds-umber-900); border: 1px solid var(--cds-umber-700); color: var(--cds-ink); border-radius: 6px; padding: 7px; font-size: 12px; margin-top: 6px; }
  .or { display: flex; align-items: center; gap: 10px; color: var(--cds-muted); font-size: 12px; margin: 16px 0; }
  .or::before, .or::after { content: ""; flex: 1; height: 1px; background: var(--cds-umber-700); }
  .card button.google { width: 100%; background: #fff; color: #1f1f1f; border: 1px solid #dadce0; border-radius: 8px; padding: 11px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .card button.google:hover { background: #f7f8f8; }
  .card button.google .g { font-weight: 800; color: #4285F4; font-size: 16px; }
  .pwlink { display: inline-block; margin-top: 16px; font-size: 12px; color: var(--cds-muted); text-decoration: underline; cursor: pointer; }

  main.dash { flex: 1; padding: 30px 40px; }
  main.dash h2 { margin: 0 0 4px; font-size: 18px; }
  main.dash .hint { color: var(--cds-muted); font-size: 13px; margin-bottom: 22px; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .tile { background: var(--cds-umber); border: 1px solid var(--cds-umber-700); border-radius: var(--cds-radius); padding: 20px; cursor: pointer; display: flex; flex-direction: column; gap: 8px; min-height: 120px; transition: border-color 0.12s; }
  .tile:hover { border-color: var(--cds-ochre); }
  .tile.soon { opacity: 0.55; cursor: default; }
  .tile.soon:hover { border-color: var(--cds-umber-700); }
  .tile .icon { font-size: 22px; }
  .tile .name { font-weight: 700; font-size: 16px; }
  .tile .desc { color: var(--cds-muted); font-size: 12px; line-height: 1.4; }
  .tile .badge { align-self: flex-start; margin-top: auto; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; background: var(--cds-umber-700); color: var(--cds-muted); padding: 2px 7px; border-radius: 10px; }
  .tile .badge.live { background: var(--cds-ochre); color: var(--cds-umber-900); }
</style>
</head>
<body>
  <header>
    <span class="wordmark"><span class="cyber">Cyber</span><span class="os">OS</span></span>
    <span class="slogan">Turn Your Will Into Real</span>
    <span class="spacer"></span>
    <span class="who" id="who"></span>
    <button class="logout" id="logout" type="button" style="display:none;">Sign out</button>
  </header>

  <div class="center" id="login-view">
    <div class="card">
      <h1>Sign in</h1>
      <div class="sub">to your CyberOS workspace</div>
      <button class="google" id="google-btn" type="button"><span class="g">G</span> Sign in with Google</button>
      <div class="err" id="google-err"></div>
      <a class="pwlink" id="pw-toggle" href="#" role="button">Admin sign-in</a>
      <form id="login-form" style="display:none;">
        <div class="field">
          <label>Workspace (tenant)</label>
          <input id="f-tenant" value="cyberskill" autocomplete="organization" spellcheck="false" />
        </div>
        <div class="field">
          <label>Handle</label>
          <input id="f-handle" value="@stephen" autocomplete="username" spellcheck="false" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="f-password" type="password" autocomplete="current-password" />
        </div>
        <button class="primary" id="login-btn" type="submit">Sign in</button>
        <div class="err" id="login-err"></div>
      </form>
      <details class="advanced">
        <summary>Service endpoints</summary>
        <label>Auth URL<input id="f-auth" value="http://127.0.0.1:7700" spellcheck="false" /></label>
        <label>Chat URL<input id="f-chat" value="http://127.0.0.1:7720" spellcheck="false" /></label>
      </details>
    </div>
  </div>

  <main class="dash" id="dash-view" style="display:none;">
    <h2 id="greeting">Workspace</h2>
    <div class="hint">Pick a module to begin.</div>
    <div class="tiles" id="tiles"></div>
  </main>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var LS = {
    token: "cyberos_chat_token", chatBase: "cyberos_chat_base", authBase: "cyberos_auth_base",
    email: "cyberos_user_email", refresh: "cyberos_refresh_token"
  };

  function get(k) { try { return localStorage.getItem(k) || ""; } catch (e) { return ""; } }
  function set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  function del(k) { try { localStorage.removeItem(k); } catch (e) {} }

  function decode(token) {
    try {
      var p = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
      p += "====".slice(p.length % 4 || 4);
      return JSON.parse(atob(p));
    } catch (e) { return null; }
  }
  function tokenValid(token) {
    var c = decode(token);
    return !!(c && c.exp && c.exp * 1000 > Date.now());
  }

  // For the team rollout we show Chat only. The other modules stay defined but hidden:true so they are
  // easy to bring back later - just remove the hidden flag (operator modules, not for the whole team yet).
  var MODULES = [
    { id: "chat", icon: "💬", name: "Chat", desc: "Channels, messages, and live presence on the CyberOS identity.", live: true, href: "chat.html" },
    { id: "assistant", icon: "✨", name: "Assistant", desc: "Talk to your model through the CyberOS AI gateway.", live: true, href: "index.html", hidden: true },
    { id: "ai", icon: "🛠", name: "AI Ops", desc: "Provider routing, spend caps, residency (TASK-APP-003).", live: true, href: "ai.html", hidden: true },
    { id: "mcp", icon: "🔌", name: "MCP Registry", desc: "Tools the MCP gateway is serving now (TASK-APP-004).", live: true, href: "mcp.html", hidden: true },
    { id: "memory", icon: "🧾", name: "Memory & Audit", desc: "Browse the tenant's hash-chained audit log (TASK-APP-005).", live: true, href: "audit.html", hidden: true },
    { id: "cuo", icon: "🧠", name: "Workflows & GENIE", desc: "Dream-loop envelope and the task backlog (TASK-APP-006).", live: true, href: "cuo.html", hidden: true }
  ];

  function renderDashboard() {
    var email = get(LS.email);
    $("greeting").textContent = email ? ("Welcome, " + email) : "Workspace";
    $("who").textContent = email || "";
    $("logout").style.display = "inline-block";
    var box = $("tiles");
    box.innerHTML = "";
    MODULES.filter(function (m) { return !m.hidden; }).forEach(function (m) {
      var t = document.createElement(m.live ? "a" : "div");
      t.className = "tile" + (m.live ? "" : " soon");
      if (m.live && m.href) { t.setAttribute("href", m.href); t.style.textDecoration = "none"; t.style.color = "inherit"; }
      t.innerHTML = '<div class="icon">' + m.icon + '</div><div class="name">' + m.name +
        '</div><div class="desc">' + m.desc + '</div><div class="badge' + (m.live ? " live" : "") + '">' +
        (m.live ? "Open" : "Soon") + '</div>';
      box.appendChild(t);
    });
    $("login-view").style.display = "none";
    $("dash-view").style.display = "block";
  }

  function showLogin() {
    $("dash-view").style.display = "none";
    $("login-view").style.display = "flex";
    $("logout").style.display = "none";
    $("who").textContent = "";
  }

  async function login(tenant, handle, password) {
    var authBase = $("f-auth").value.replace(/\/+$/, "");
    var chatBase = $("f-chat").value.replace(/\/+$/, "");
    var res = await fetch(authBase + "/v1/auth/token", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ grant_type: "password", tenant_slug: tenant, handle: handle, password: password })
    });
    var data = await res.json().catch(function () { return null; });
    if (!res.ok || !data || !data.access_token) {
      throw new Error(data && data.error ? data.error : ("sign-in failed (" + res.status + ")"));
    }
    set(LS.token, data.access_token);
    set(LS.refresh, data.refresh_token || "");
    set(LS.chatBase, chatBase);
    set(LS.authBase, authBase);
    var claims = decode(data.access_token);
    set(LS.email, (claims && claims.email) || handle);
    renderDashboard();
  }

  $("login-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    $("login-err").textContent = "";
    $("login-btn").disabled = true;
    try {
      await login($("f-tenant").value.trim(), $("f-handle").value.trim(), $("f-password").value);
    } catch (err) {
      $("login-err").textContent = err.message;
    } finally {
      $("login-btn").disabled = false;
    }
  });
  $("logout").onclick = function () { del(LS.token); del(LS.email); showLogin(); };

  // --- Google (OIDC) sign-in --------------------------------------------------
  function authBaseVal() { return ($("f-auth").value || "").replace(/\/+$/, "") || get(LS.authBase); }
  function chatBaseVal() { return ($("f-chat").value || "").replace(/\/+$/, ""); }

  async function googleSignIn() {
    $("google-err").textContent = "";
    var tenant = $("f-tenant").value.trim() || "cyberskill";
    var authBase = authBaseVal();
    // Remember the chosen service bases so the post-redirect boot reuses them.
    set(LS.authBase, authBase);
    set(LS.chatBase, chatBaseVal());
    var ret = location.origin + location.pathname; // come back to this page
    try {
      var res = await fetch(authBase + "/v1/auth/oidc/initiate?tenant_slug=" + encodeURIComponent(tenant) + "&idp=google&return_to=" + encodeURIComponent(ret));
      var data = await res.json().catch(function () { return null; });
      if (!res.ok || !data || !data.authorization_url) {
        throw new Error(data && data.error ? data.error : ("could not start Google sign-in (" + res.status + ")"));
      }
      window.location.href = data.authorization_url; // top-level nav to Google
    } catch (e) { $("google-err").textContent = e.message; }
  }
  $("google-btn").onclick = googleSignIn;

  // Password sign-in is hidden by default (team uses Google). This reveals it as a break-glass path for
  // admins - the form and its handler are unchanged, just shown on demand.
  (function () {
    var t = $("pw-toggle");
    if (t) t.onclick = function (e) { e.preventDefault(); $("login-form").style.display = "block"; t.style.display = "none"; $("f-password").focus(); };
  })();

  // OIDC hand-back: the auth callback 302'd back here with the token in the URL
  // fragment. Capture it like a password sign-in, then scrub the URL so the token
  // is not left in the address bar or browser history.
  function captureHandback() {
    if (!location.hash || location.hash.indexOf("access_token") === -1) return false;
    var p = new URLSearchParams(location.hash.replace(/^#/, ""));
    var at = p.get("access_token");
    if (!at) return false;
    set(LS.token, at);
    if (p.get("refresh_token")) set(LS.refresh, p.get("refresh_token"));
    if (!get(LS.authBase)) set(LS.authBase, authBaseVal());
    if (!get(LS.chatBase)) set(LS.chatBase, chatBaseVal());
    var claims = decode(at);
    set(LS.email, (claims && claims.email) || "");
    try { history.replaceState(null, "", location.pathname + location.search); } catch (e) { location.hash = ""; }
    return true;
  }

  // returning visitor: a valid access token skips login; an expired one with a refresh token is
  // refreshed silently; otherwise sign in.
  async function refreshAccess() {
    var rt = get(LS.refresh); var ab = get(LS.authBase) || $("f-auth").value.replace(/\/+$/, "");
    if (!rt || !ab) return false;
    try {
      var res = await fetch(ab + "/v1/auth/token", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ grant_type: "refresh_token", refresh_token: rt }) });
      if (!res.ok) return false;
      var data = await res.json();
      if (!data || !data.access_token) return false;
      set(LS.token, data.access_token);
      if (data.refresh_token) set(LS.refresh, data.refresh_token);
      return true;
    } catch (e) { return false; }
  }
  // Single-origin production: when the page is not served from localhost, the console, auth, and chat
  // sit behind one Caddy origin, so default the service endpoints to that origin (dev keeps localhost).
  (function originDefaults() {
    var h = location.hostname;
    if (h && h !== "localhost" && h !== "127.0.0.1") {
      if (($("f-auth").value || "").indexOf("127.0.0.1") !== -1) $("f-auth").value = location.origin;
      if (($("f-chat").value || "").indexOf("127.0.0.1") !== -1) $("f-chat").value = location.origin;
    }
  })();

  (async function boot() {
    if (captureHandback()) { renderDashboard(); return; }
    if (tokenValid(get(LS.token))) { renderDashboard(); return; }
    if (get(LS.refresh) && await refreshAccess()) { renderDashboard(); return; }
    del(LS.token); showLogin(); $("f-password").focus();
  })();
})();
</script>
</body>
</html>
