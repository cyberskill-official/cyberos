<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CyberOS</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        background: #1e0f08;
        color: #f6ecdd;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: grid;
        place-items: center;
      }
      .load { text-align: center; }
      .mark { font-weight: 800; font-size: 26px; letter-spacing: 0.5px; }
      .mark .os { color: #f4ba17; }
      .sub { color: #917a62; font-size: 13px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="load">
      <div class="mark">Cyber<span class="os">OS</span></div>
      <div class="sub">Loading your workspace...</div>
    </div>
    <script>
      // The desktop app is a native shell over the live CyberOS console, so it always matches the web app.
      // The Safari user-agent set in tauri.conf.json lets Google accept OAuth inside this webview.
      window.location.replace("https://os.cyberskill.world/web/");
    </script>
  </body>
</html>
