name: release

# Versioned NATIVE release, cut by pushing a tag `vX.Y.Z`. The web app / PWA / desktop shell all load the
# live /web/, so web content ships continuously via deploy.yml - this workflow only builds the native
# binaries: signed desktop installers (always) and the mobile apps (once MOBILE_RELEASE is turned on). It
# publishes a GitHub Release and attaches the desktop installers.
#
# HOW TO CUT A RELEASE - and why the obvious way does NOT work:
#
#   DO:    gh workflow run release.yml --ref main -f tag=vX.Y.Z      (after pushing the tag)
#   NOT:   git tag vX.Y.Z && git push origin vX.Y.Z                  ... alone. It will not build anything.
#
# The tag trigger below is real, but it cannot fire on the commit you actually want to tag. version.yml
# commits the new VERSION as `chore(release): X.Y.Z [skip ci]`, and that IS the commit carrying the version
# you are releasing - so it is the one you would naturally tag. GitHub honours [skip ci] and skips EVERY
# workflow for that commit, tag pushes included: the tag lands, nothing runs, and it looks like the tag was
# simply ignored. (Tagging an earlier commit "works", but that commit has the OLD VERSION, so the stamper
# would mislabel every installer - worse than not building.)
#
# The [skip ci] itself is load-bearing (TASK-IMP-068 §1 #7: it keeps payload-gate.yml off the bump commit,
# which version.yml compensates for by proving the payload builds at the new version), so it is not simply
# removable. Push the tag for provenance, then dispatch this workflow against it.
#
# Secrets + accounts this consumes are listed in docs/deploy/RELEASE.md (Apple / Windows / Google signing, App Store
# Connect, the Tauri updater key). Desktop builds run unsigned until the signing secrets are present, so the
# pipeline works from day one and signing slots in later.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0)'
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  # TASK-IMP-069: publish the versioned cyberos payload + Claude plugin as release assets.
  # The stable names (cyberos-payload.tar.gz, cyberos.plugin) make releases/latest/download/
  # a canonical URL for bootstrap.sh, rollout.sh --from-release, and manual installs.
  payload:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    env:
      # Dispatch-aware like the installer jobs: bump commits carry [skip ci], so tag pushes on
      # them never fire push triggers - releases are cut via workflow_dispatch with the tag input.
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.tag || github.ref_name }}" }
      - name: Tag must equal v$(cat VERSION)
        run: test "v$(cat VERSION)" = "$TAG"
      - name: Build the payload
        run: bash tools/install/build.sh "$RUNNER_TEMP/payload"
      - name: Verify every stamp equals VERSION (TASK-IMP-068)
        run: bash tools/install/check-version-sync.sh "$RUNNER_TEMP/payload"
      - name: Produce deterministic release assets
        run: bash tools/install/release-assets.sh "$RUNNER_TEMP/payload" "$RUNNER_TEMP/assets"
      - name: Render release notes (asset guide + CHANGELOG section)
        run: |
          ver="${TAG#v}"
          bash tools/install/render-release-notes.sh "$ver" "$RUNNER_TEMP/RELEASE_NOTES.md"
          # Keep a short title; body is the human guide (filenames alone confuse users).
          echo "CyberOS v${ver}" > "$RUNNER_TEMP/RELEASE_TITLE.txt"
      - name: Upload to the release (create-or-upload, idempotent)
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          TITLE="$(cat "$RUNNER_TEMP/RELEASE_TITLE.txt")"
          NOTES="$RUNNER_TEMP/RELEASE_NOTES.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES"
          else
            gh release create "$TAG" --verify-tag --title "$TITLE" --notes-file "$NOTES"
          fi
          gh release upload "$TAG" "$RUNNER_TEMP"/assets/* --clobber

  # The three channels tools/install/tests/test_channels.sh defers here, because each needs a
  # daemon, a runner, or the network that a dev box cannot be assumed to have. That test's
  # CI_ONLY list and this job are two halves of one contract: a channel absent from BOTH is a
  # hard failure there, so a channel cannot be quietly dropped by deleting it from one side.
  #
  # This exists because a declared channel proves nothing until something runs it. Each step
  # below executes the channel end to end rather than checking that its files are present.
  channels:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.tag || github.ref_name }}" }

      - name: Build the payload the channels deliver
        run: bash tools/install/build.sh "$RUNNER_TEMP/payload"

      # Local-provable channels, re-run here so a release cannot be cut from a tree that
      # never ran the pre-commit suite.
      - name: Channel gate (local-provable channels)
        run: bash tools/install/tests/test_channels.sh

      # docker: BUILD it and RUN it. A build proves the image assembles; only a run proves
      # the ENTRYPOINT resolves and the machine lands on disk.
      - name: docker channel — build
        run: docker build -f tools/install/Dockerfile -t cyberos:ci "$RUNNER_TEMP/payload"
      - name: docker channel — run against a real repo, then assert it installed
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/dockerwork"; mkdir -p "$work"; git -C "$work" init -q
          docker run --rm -v "$work:/work" cyberos:ci
          # Exit 0 is not the claim. The claim is that the machine is on disk.
          test -d "$work/.cyberos"            || { echo "docker: no .cyberos/ produced"; exit 1; }
          test -f "$work/.cyberos/manifest.yaml" || { echo "docker: no manifest"; exit 1; }
          got="$(grep -E '^rules_sha:' "$work/.cyberos/manifest.yaml" | awk '{print $2}')"
          want="$(grep -E '^rules_sha:' "$RUNNER_TEMP/payload/manifest.yaml" | awk '{print $2}')"
          test "$got" = "$want" || { echo "docker: rules_sha drift got=$got want=$want"; exit 1; }
          echo "docker channel: installed, rules_sha matches the payload"

      # github-action: the action the channel advertises must parse AND every script it
      # invokes must exist in the payload.
      - name: github-action channel — action.yml resolves and runs a real entry point
        run: |
          set -euo pipefail
          act="tools/install/ci/github-action/action.yml"
          test -f "$act" || { echo "github-action: declared as a channel but $act is missing"; exit 1; }
          python3 -c 'import sys,yaml; yaml.safe_load(open(sys.argv[1]))' "$act"
          # Parsing is not the claim. Every script the action invokes must exist IN THE PAYLOAD
          # -- this is the channel that would otherwise rot exactly like the docker ENTRYPOINT.
          #
          # The action runs `.cyberos/...` paths: that is the payload after install.sh lays it
          # down, so each one resolves against the built payload root, not this checkout. An
          # earlier draft of this step scanned for `tools/install/...` instead, matched nothing,
          # and printed "every invoked script exists" having checked ZERO scripts. The `-eq 0`
          # guard below exists so that a pass always means something was actually verified.
          scripts="$(grep -oE '\.cyberos/[A-Za-z0-9_./-]+\.sh' "$act" | sed 's#^\.cyberos/##' | sort -u)"
          n=0; miss=0
          for s in $scripts; do
            n=$((n+1))
            if [ ! -f "$RUNNER_TEMP/payload/$s" ]; then
              echo "github-action: action.yml invokes .cyberos/$s, which the payload does not ship"; miss=1
            else
              echo "  ok: .cyberos/$s"
            fi
          done
          if [ "$n" -eq 0 ]; then
            echo "github-action: this check matched no scripts — it would pass vacuously. Fix the check."; exit 1
          fi
          test "$miss" -eq 0
          echo "github-action channel: $act parses; all $n invoked script(s) exist in the payload"

  # npx-cli, published via TRUSTED PUBLISHING (OIDC) -- no npm token anywhere.
  #
  # npm exchanges this job's short-lived GitHub OIDC token for a scoped publish token at
  # publish time. Nothing long-lived exists to leak, rotate, or over-scope. The trust is
  # pinned on npmjs.com to: this org + repo + THIS workflow filename (release.yml).
  #
  # Four things the docs make load-bearing, all of which bit us or would have:
  #   1. Node >= 22.14.0 / npm >= 11.5.1. This job ran Node 20, which cannot do OIDC.
  #   2. package.json `repository.url` must EXACTLY match the GitHub repo, or npm refuses.
  #      build.sh emits it; check-repository-url below fails loudly rather than at publish.
  #   3. NO --provenance flag. Trusted publishing generates provenance automatically, and
  #      passing the flag is how the previous attempt died (EUSAGE on id-token).
  #   4. The workflow FILENAME is part of the trust. Renaming this file silently breaks
  #      publishing with ENEEDAUTH -- npm never validates the config when you save it.
  npm:
    needs: payload
    runs-on: ubuntu-latest        # OIDC requires a cloud runner; self-hosted is unsupported
    permissions:
      contents: read
      id-token: write             # mints the OIDC token npm exchanges. Without it: ENEEDAUTH.
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.tag || github.ref_name }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: npm must be >= 11.5.1 for OIDC
        run: |
          set -euo pipefail
          npm install -g npm@latest
          echo "npm $(npm -v) / node $(node -v)"
          node -e 'const [a,b,c]=process.versions.node.split(".").map(Number);
                   if (a<22 || (a===22 && b<14)) { console.error("node too old for OIDC"); process.exit(1); }'
      - name: Build the payload (build.sh generates the npm package.json)
        run: bash tools/install/build.sh "$RUNNER_TEMP/payload"
      - name: Publish @cyberskill/cyberos via OIDC
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/payload"
          test -f package.json || { echo "build.sh produced no package.json"; exit 1; }
          name="$(node -p "require('./package.json').name")"
          test "$name" = "@cyberskill/cyberos" || { echo "package name is '$name'"; exit 1; }
          # npm rejects the publish when repository.url does not match the GitHub repo.
          # Assert it here so the failure names its cause instead of surfacing as auth noise.
          url="$(node -p "require('./package.json').repository?.url || ''")"
          case "$url" in
            *cyberskill-official/cyberos*) : ;;
            *) echo "repository.url is '$url' — must point at cyberskill-official/cyberos"; exit 1 ;;
          esac
          # Re-running a release must not fail on an already-published version.
          if npm view "@cyberskill/cyberos@${TAG#v}" version >/dev/null 2>&1; then
            echo "@cyberskill/cyberos@${TAG#v} already published — nothing to do"
          else
            npm publish --access public   # provenance is automatic under trusted publishing
          fi

  # Signed native desktop installers (.dmg / .msi / .AppImage) via the official Tauri action. The desktop app
  # is a thin shell that loads os.cyberskill.world/web, so there is no web build step here.
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    # macOS ships a UNIVERSAL binary (arm64 + x86_64 in one bundle). GitHub's `macos-latest` is Apple Silicon
    # now - the v1.7.0 runner image was macos-26-arm64 - so an unqualified `tauri build` emitted ONLY
    # CyberOS_1.7.0_aarch64.dmg, and every Intel Mac had no installer at all. Silently: the job was green and
    # a .dmg was sitting right there on the release, it just could not run on half the Macs in the world.
    # `--target universal-apple-darwin` fixes it, and needs BOTH rustc targets (see the toolchain step).
    #
    # Signing creds live at JOB level so the build attempt and the retry share them. macOS CODE SIGNING is
    # opt-in behind MACOS_SIGN: tauri-action codesigns whenever APPLE_CERTIFICATE is a NON-EMPTY string, so a
    # stray or malformed cert would break the whole macOS build at signing; gating forces these empty until
    # you deliberately turn signing on (default = a clean UNSIGNED build that always succeeds). Updater
    # signing is opt-in behind DESKTOP_UPDATER_SIGN for the same reason.
    #
    # NOTARIZATION IS DELIBERATELY NOT IN THIS ENV. tauri notarizes *inside* `tauri build` whenever APPLE_ID +
    # APPLE_PASSWORD + APPLE_TEAM_ID are present, and then blocks polling Apple for a verdict. On v1.0.0 that
    # poll ran 54 minutes and died with NSURLErrorDomain -1009 ("no network route") - twice - burning a full
    # 60-minute build each time while Apple simply sat on the submission (both stayed "In Progress" for
    # hours). So the build now SIGNS ONLY, and notarize+staple runs as a separate, bounded, non-fatal step
    # below. A stalled Apple notary queue can no longer cost a release.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_CERTIFICATE: ${{ vars.MACOS_SIGN == 'true' && secrets.APPLE_CERTIFICATE || '' }}
      APPLE_CERTIFICATE_PASSWORD: ${{ vars.MACOS_SIGN == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
      APPLE_SIGNING_IDENTITY: ${{ vars.MACOS_SIGN == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ vars.DESKTOP_UPDATER_SIGN == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ vars.DESKTOP_UPDATER_SIGN == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.tag || github.ref_name }}" }

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The installers carry their OWN version fields and had drifted from the platform VERSION
      # (tauri.conf.json still said 1.0.0 while VERSION said 1.2.0). Stamp them so a tag can never ship a
      # mislabelled binary.
      - name: Stamp VERSION into the installers
        run: node scripts/stamp-release-version.mjs --apply

      # Both macOS arches, so `--target universal-apple-darwin` has something to lipo together. On the arm64
      # runner x86_64-apple-darwin is NOT installed by default, and the universal build fails without it.
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Attempt 1. Signs, does NOT notarize (see the job note). continue-on-error so one transient failure
      # does not sink the release; the retry below re-runs it once, and non-transient breakage still fails
      # the job afterwards. `args` adds createUpdaterArtifacts ONLY when the updater key exists, because
      # tauri errors out if asked to emit updater artifacts with no signing key.
      - name: Build + publish desktop installers
        id: build
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: ${{ matrix.os == 'macos-latest' && '--target universal-apple-darwin' || '' }} ${{ vars.DESKTOP_UPDATER_SIGN == 'true' && '--config src-tauri/tauri.updater.conf.json' || '' }}
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'CyberOS ${{ github.event.inputs.tag || github.ref_name }}'
          releaseDraft: true
          prerelease: false

      # Retry once when attempt 1 failed. tauri-action finds the existing draft release by tag and updates
      # its assets, so re-running is safe. If this attempt also fails, the job fails (no continue-on-error).
      - name: Retry desktop build once (transient failure)
        if: steps.build.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: ${{ matrix.os == 'macos-latest' && '--target universal-apple-darwin' || '' }} ${{ vars.DESKTOP_UPDATER_SIGN == 'true' && '--config src-tauri/tauri.updater.conf.json' || '' }}
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'CyberOS ${{ github.event.inputs.tag || github.ref_name }}'
          releaseDraft: true
          prerelease: false

      # Notarize + staple OUT OF BAND. The signed .dmg is already attached to the draft release, so this step
      # is bounded (--timeout) and non-fatal (continue-on-error): if Apple's queue stalls we ship signed and
      # staple later rather than losing a 60-minute build. On success the stapled .dmg replaces the asset
      # (--clobber). Gated on MACOS_NOTARIZE so you can ship signed-only at will.
      - name: Notarize + staple the macOS build
        id: notarize
        if: ${{ matrix.os == 'macos-latest' && vars.MACOS_SIGN == 'true' && vars.MACOS_NOTARIZE == 'true' }}
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          NOTARY_TIMEOUT: ${{ vars.MACOS_NOTARY_TIMEOUT || '20m' }}
        run: |
          set -euo pipefail
          # Search the whole target tree, not target/release/bundle/dmg: a --target build puts its output
          # under target/<triple>/release/bundle/dmg, so the old hardcoded path would find nothing the moment
          # macOS went universal - and this step exits 0 on "nothing found", so it would have gone GREEN
          # while notarizing nothing at all. Do not narrow this path again.
          DMG="$(find apps/desktop/src-tauri/target -name '*.dmg' | head -1)"
          if [ -z "$DMG" ]; then echo "::error::no .dmg found under apps/desktop/src-tauri/target - the macOS build produced no disk image"; exit 1; fi
          echo "submitting $DMG to the Apple notary service (bounded wait: $NOTARY_TIMEOUT)"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait --timeout "$NOTARY_TIMEOUT"
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          gh release upload "$TAG" "$DMG" --clobber --repo "$GITHUB_REPOSITORY"
          echo "macOS: notarized + stapled + re-uploaded $(basename "$DMG")" >> "$GITHUB_STEP_SUMMARY"

      # continue-on-error above means a notarization timeout leaves the JOB green. That is intentional (do
      # not lose a 60-minute build to Apple's queue) but it must not be SILENT: v1.7.0 timed out at exit 124
      # and published a signed-but-un-notarized .dmg under a green tick, and Gatekeeper blocks exactly that.
      # Say so, loudly, and name the lever that fixes it.
      - name: Say so when notarization did not finish
        if: ${{ matrix.os == 'macos-latest' && steps.notarize.outcome == 'failure' }}
        run: |
          echo "::warning::macOS notarization did NOT complete - the published .dmg is signed but NOT notarized, and Gatekeeper will refuse it on download."
          {
            echo "### :warning: macOS .dmg is NOT notarized"
            echo ""
            echo "The build is signed and attached to the release, but notarization did not finish (Apple's"
            echo "notary queue, most likely). Gatekeeper refuses a downloaded app that is not notarized, so"
            echo "this asset will fail to open on a real Mac."
            echo ""
            echo "Fix it without rebuilding: **Actions > notarize-macos > Run workflow**, tag \`${TAG}\`."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}

  # Android app bundle (Capacitor). Gated on the repo variable ANDROID_RELEASE=true (the android/ project is
  # committed and the upload keystore is configured via the ANDROID_* secrets). Legacy MOBILE_RELEASE=true is
  # still honoured so existing setups keep working. iOS has its OWN gate (IOS_RELEASE) so turning Android on
  # never triggers the iOS job before its project exists - that would fail at `cap sync ios` for nothing.
  android:
    if: ${{ vars.ANDROID_RELEASE == 'true' || vars.MOBILE_RELEASE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.tag || github.ref_name }}" }
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      # versionName + versionCode were hardcoded ("1.0" / 1). Play REJECTS any upload whose versionCode it
      # has already seen, so publishing could never work twice. The stamper writes versionName from the
      # platform VERSION and versionCode from the monotonic BUILD_NUMBER floor. Those are two different
      # numbers on purpose: VERSION can move in any direction a product decision requires (it was rolled
      # back to 0.1.0 for the pre-1.0 run-up), while a versionCode can only ever go UP, forever.
      # BUILD_NUMBER alone was not enough (TASK-IMP-078): it only moves when version.yml bumps VERSION, so
      # while Release-As pinned 1.0.0 a re-tag rebuilt the SAME versionCode and Play refused the second
      # upload (observed: 10706). --store-monotonic lifts the effective code to
      # max(BUILD_NUMBER, minutes-since-epoch), so every run ships strictly higher, however often the
      # same version is re-tagged.
      - name: Stamp VERSION into the Android app
        run: node scripts/stamp-release-version.mjs --apply --store-monotonic
      - name: Build web + sync Capacitor
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          npx cap sync android
      # TASK-IMP-073 §6 Option B: the Capacitor Android shell once shipped Capacitor's default
      # template icon because nothing ever asserted the launcher assets match the brand source
      # (apps/desktop/src-tauri/icons/android - the Tauri-generated, brand-approved set). This
      # guard turns the two silent regressions in TASK-IMP-073 §10 (a `npx cap add` re-scaffold
      # resetting the icons; a desktop rebrand that forgets the mobile copies) into a loud,
      # per-file CI failure. Runs AFTER cap sync so it also catches anything sync rewrites.
      - name: Assert Android launcher icons match the desktop brand source (TASK-IMP-073)
        run: |
          fail=0
          for p in mipmap-mdpi/ic_launcher.png mipmap-mdpi/ic_launcher_foreground.png mipmap-mdpi/ic_launcher_round.png \
                   mipmap-hdpi/ic_launcher.png mipmap-hdpi/ic_launcher_foreground.png mipmap-hdpi/ic_launcher_round.png \
                   mipmap-xhdpi/ic_launcher.png mipmap-xhdpi/ic_launcher_foreground.png mipmap-xhdpi/ic_launcher_round.png \
                   mipmap-xxhdpi/ic_launcher.png mipmap-xxhdpi/ic_launcher_foreground.png mipmap-xxhdpi/ic_launcher_round.png \
                   mipmap-xxxhdpi/ic_launcher.png mipmap-xxxhdpi/ic_launcher_foreground.png mipmap-xxxhdpi/ic_launcher_round.png; do
            a="apps/desktop/src-tauri/icons/android/$p"
            b="apps/web/android/app/src/main/res/$p"
            [ -f "$a" ] || { echo "::error::icon guard: brand source missing: $a"; fail=1; continue; }
            [ -f "$b" ] || { echo "::error::icon guard: Capacitor icon missing: $b"; fail=1; continue; }
            if [ "$(sha256sum "$a" | cut -d' ' -f1)" != "$(sha256sum "$b" | cut -d' ' -f1)" ]; then
              echo "::error::icon guard DRIFT: $b != $a (re-copy from apps/desktop/src-tauri/icons/android - docs/deploy/RELEASE.md)"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "icon guard: all 15 Android launcher assets match the brand source"
          exit "$fail"
      - name: Assemble signed AAB
        working-directory: apps/web/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/release.keystore \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD
      - uses: actions/upload-artifact@v4
        with:
          name: cyberos-android-aab
          path: apps/web/android/app/build/outputs/bundle/release/*.aab

      # Publish the .aab to the Play INTERNAL track. Opt-in behind PLAY_PUBLISH=true so the job keeps
      # building (and attaching) the bundle until Play is wired - the previous behaviour was build-only.
      # Needs a Play service account with "Release to testing tracks" permission; its JSON goes in
      # PLAY_SERVICE_ACCOUNT_JSON (docs/deploy/RELEASE.md). Internal track is the safe default: it does not
      # go to users until you promote it in the Play Console.
      - name: Publish to Google Play (internal track)
        if: ${{ vars.PLAY_PUBLISH == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: os.cyberskill.world
          releaseFiles: apps/web/android/app/build/outputs/bundle/release/*.aab
          tracks: internal
          status: completed

  # iOS build + TestFlight (Capacitor). OWN gate IOS_RELEASE=true - do NOT reuse the Android gate.
  #
  # This job used to end in `run: echo "Run fastlane beta ..."`. With IOS_RELEASE=true it therefore archived
  # nothing, uploaded nothing, and reported SUCCESS - a green iOS release that shipped no iOS. The lane now
  # exists (apps/web/ios/App/fastlane/Fastfile) and this job runs it for real.
  #
  # ONE-TIME SETUP, and iOS cannot ship until it is done (the preflight step below fails loudly, by design,
  # rather than letting the job go green again):
  #   1. App Store Connect > Users and Access > Integrations > App Store Connect API > generate a team key
  #      with the App Manager role (App Manager, not Developer: Xcode needs it to create the distribution
  #      certificate and provisioning profile on the fly via -allowProvisioningUpdates).
  #   2. Add three repo secrets:
  #        APP_STORE_CONNECT_KEY_ID     the key's Key ID
  #        APP_STORE_CONNECT_ISSUER_ID  the Issuer ID shown above the key list
  #        APP_STORE_CONNECT_API_KEY    the downloaded .p8, base64-encoded:  base64 -i AuthKey_XXXX.p8
  #   3. Register the App ID os.cyberskill.world and create the app record in App Store Connect (an upload
  #      to an app that does not exist fails at the very last step).
  # APPLE_TEAM_ID already exists (macOS notarization uses it) and is reused here.
  #
  # NOT an Apple ID + app-specific password: that flow trips 2FA in CI and cannot upload unattended. The
  # existing APPLE_ID/APPLE_PASSWORD pair is for notarytool, and is not interchangeable with this.
  ios:
    if: ${{ vars.IOS_RELEASE == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.tag || github.ref_name }}" }
      - uses: actions/setup-node@v4
        with: { node-version: 24 }

      # Refuse to be a green job that ships nothing. If the credentials are absent, say exactly what is
      # missing and stop - do not archive for 20 minutes first, and do not pretend to have succeeded.
      - name: Preflight - App Store Connect credentials
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=""
          [ -n "$APP_STORE_CONNECT_KEY_ID" ]    || missing="$missing APP_STORE_CONNECT_KEY_ID"
          [ -n "$APP_STORE_CONNECT_ISSUER_ID" ] || missing="$missing APP_STORE_CONNECT_ISSUER_ID"
          [ -n "$APP_STORE_CONNECT_API_KEY" ]   || missing="$missing APP_STORE_CONNECT_API_KEY"
          [ -n "$APPLE_TEAM_ID" ]               || missing="$missing APPLE_TEAM_ID"
          if [ -n "$missing" ]; then
            echo "::error::IOS_RELEASE is on but iOS cannot ship: missing secret(s):$missing"
            {
              echo "### :x: iOS cannot ship - missing credentials"
              echo ""
              echo "Missing:\`$missing\`"
              echo ""
              echo "See the one-time setup in the \`ios\` job comment in .github/workflows/release.yml."
              echo "Until these exist, turn **IOS_RELEASE off** so the release stops claiming an iOS build."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # Same stamper as Android: MARKETING_VERSION from the root VERSION, CURRENT_PROJECT_VERSION from
      # the monotonic build-number floor. --store-monotonic (TASK-IMP-078) matters here exactly as on
      # Android: ASC consumed build 10706 for 1.0.0 on the first green upload, so a re-tag re-offering
      # the committed BUILD_NUMBER would be rejected. minutes-since-epoch keeps every upload strictly
      # higher.
      - name: Stamp VERSION into the iOS project
        run: node scripts/stamp-release-version.mjs --apply --store-monotonic

      - name: Build web + sync Capacitor
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          npx cap sync ios

      # TASK-IMP-073 §6 Option B (iOS leg), amended by TASK-IMP-077: the iOS marketing icon is a
      # DERIVED asset - the Tauri brand source carries an alpha channel (fine for desktop),
      # but App Store Connect hard-rejects any alpha on the 1024x1024 icon (error 90717,
      # observed on the v1.0.0 run). The repo copy is the source flattened onto the brand
      # background (#fff, the adaptive-icon background). So the guard asserts the SUBMISSION
      # invariants instead of byte-identity: file present, 1024x1024, and NO alpha channel.
      - name: Assert iOS app icon is present, 1024x1024, and alpha-free (TASK-IMP-073/077)
        run: |
          b="apps/web/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png"
          [ -f "$b" ] || { echo "::error::icon guard: Capacitor iOS icon missing: $b"; exit 1; }
          dims="$(sips -g pixelWidth -g pixelHeight "$b" | awk '/pixel/{print $2}' | paste -sd x -)"
          [ "$dims" = "1024x1024" ] || { echo "::error::icon guard: iOS icon is $dims, expected 1024x1024"; exit 1; }
          if ! sips -g hasAlpha "$b" | grep -q "hasAlpha: no"; then
            echo "::error::icon guard: iOS icon has an alpha channel - ASC rejects it (90717). Re-derive per docs/deploy/RELEASE.md (flatten onto #fff)."
            exit 1
          fi
          echo "icon guard: iOS AppIcon present, 1024x1024, alpha-free"

      # App Store Connect rejects uploads built with an SDK older than iOS 26 (Xcode 26+) - Apple raises
      # this floor every spring. macos-15 runners still DEFAULT to Xcode 16.4 / iOS 18.5 SDK, which is how
      # the v1.0.0 run died at the very last step (altool 409 "SDK version issue") AFTER a clean archive,
      # export and cloud signing. Pick the newest stable Xcode on the image instead of the default, and
      # never hardcode a version - the image rotates them. DEVELOPER_DIR steers xcodebuild AND altool.
      - name: Select the newest stable Xcode on the runner
        run: |
          XCODE="$(ls -d /Applications/Xcode_*.app | grep -vi beta | sort -V | tail -n 1)"
          [ -n "$XCODE" ] || { echo "::error::no Xcode found under /Applications"; exit 1; }
          echo "DEVELOPER_DIR=$XCODE/Contents/Developer" >> "$GITHUB_ENV"
          echo "selected: $XCODE"
          DEVELOPER_DIR="$XCODE/Contents/Developer" xcodebuild -version

      - name: iOS archive + TestFlight
        working-directory: apps/web/ios/App
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: fastlane beta

  # TASK-DOCS-003: the published docs site (incl. the roadmap page) refreshes on every release
  # tag too - same build, same target as deploy.yml's docs job.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "${{ github.event.inputs.tag || github.ref_name }}"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build the site from the markdown sources
        run: bash tools/docs-site/build.sh
      # TASK-IMP-079: shared shipper - this job and deploy.yml's docs job used to inline the same
      # snippet with a SHARED docs.new staging dir; a branch push + tag push seconds apart ran both
      # concurrently and the loser died at mv. ship.sh stages per-run and swaps under a remote flock.
      - name: Ship to the VPS (/srv/console/docs)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: bash tools/docs-site/ship.sh
