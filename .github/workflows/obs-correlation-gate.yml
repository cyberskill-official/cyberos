name: obs-correlation-gate

on:
  pull_request:
    paths:
      - 'services/**'
      - '.github/workflows/obs-correlation-gate.yml'
  push:
    branches:
      - main
      - 'codex/**'
    paths:
      - 'services/**'
      - '.github/workflows/obs-correlation-gate.yml'

jobs:
  correlation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Run OBS correlation gate
        working-directory: services
        env:
          CYBEROS_OBS_SDK_DISABLE_OTLP: "1"
          CYBEROS_OBS_SDK_CAPTURE: "1"
        run: |
          cargo test -p cyberos-obs-sdk tracecontext -- --nocapture
          cargo test -p cyberos-obs-sdk log_enrichment -- --nocapture
          cargo test -p cyberos-obs-sdk exemplar -- --nocapture
          cargo test -p cyberos-obs-sdk end_to_end_correlation -- --nocapture
