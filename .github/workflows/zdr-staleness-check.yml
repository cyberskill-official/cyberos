name: ZDR Attestation Staleness Check

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'services/ai-gateway/config/zdr_attestations.yaml'
      - 'services/ai-gateway/src/zdr.rs'
      - 'services/ai-gateway/src/bin/zdr_staleness_check.rs'
      - '.github/workflows/zdr-staleness-check.yml'

jobs:
  check-staleness:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Run ZDR staleness check
        working-directory: services
        run: cargo run -p cyberos-ai-gateway --bin zdr-staleness-check -- ai-gateway/config/zdr_attestations.yaml
      - name: Open issue for scheduled stale attestations
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'ZDR attestations stale: refresh required',
              labels: ['compliance', 'zdr', 'staleness'],
              body: 'Per FR-AI-015 §1 #9, one or more ZDR attestations are stale. Refresh each provider source URL and update verified_at.'
            })
