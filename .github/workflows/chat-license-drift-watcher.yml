# FR-CHAT-001 §1 #4 — license-drift watcher.
#
# Runs every Monday 00:00 UTC. Queries the upstream mattermost-server repo
# for commits since the pinned SHA + filters for license-touching files.
# Files a `legal-review-needed` GitHub issue on drift. Operators may also
# trigger via workflow_dispatch.

name: chat-license-drift-watcher

on:
  schedule:
    - cron: '0 0 * * 1'        # Monday 00:00 UTC
  workflow_dispatch:
    inputs:
      since_window:
        description: 'Since-window for the scan (e.g. "30 days ago"). Default 7 days.'
        required: false
        default: '7 days ago'

permissions:
  contents: read
  issues: write                # required to file the legal-review-needed issue
  pull-requests: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify required files exist
        run: |
          test -f services/chat/PINNED_COMMIT
          test -x services/chat/scripts/check-license-drift.sh \
              || chmod +x services/chat/scripts/check-license-drift.sh

      - name: Run license-drift check
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          bash services/chat/scripts/check-license-drift.sh "${{ inputs.since_window || '7 days ago' }}"
          echo "scan_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Fail workflow on drift
        if: steps.scan.outputs.scan_exit == '1'
        run: |
          echo "::error::License drift detected — a legal-review-needed issue has been filed."
          exit 1

      - name: Report on success
        if: steps.scan.outputs.scan_exit == '0'
        run: |
          echo "✓ No license drift detected since pinned commit."
