name: voice + doc-consistency

on:
  # GitHub CI is deploy-only on push; this runs on pull requests and on demand only.
  pull_request:
    paths:
      - "modules/memory/docs/**"
      - "modules/memory/memory.schema.json"
      - "modules/memory/cyberos/**"
      - "modules/memory/tools/voice_check.py"
      - "modules/memory/tools/cyberos_generate_schema.py"
      - "modules/memory/tests/**"
      - ".github/workflows/voice-and-consistency.yml"
  workflow_dispatch:

# Pinned to Node 24-compatible action versions (Node.js 20 is deprecated
# per GitHub's 2026-06-02 default-flip; see
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/).

jobs:
  voice-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: install deps
        run: pip install pyyaml rfc8785
      - name: voice linter (advisory)
        run: |
          # Voice standard adoption is additive — non-strict on existing docs.
          python3 modules/memory/tools/voice_check.py --summary
        continue-on-error: true  # advisory only; remove once voice debt cleared
      - name: voice linter strict on new DEC/REF/FACT
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -E "memories/(decisions|refinements|facts)/" || true)
            if [ -n "$CHANGED" ]; then
              python3 modules/memory/tools/voice_check.py --strict $CHANGED
            fi
          fi

  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: install deps
        run: |
          pip install -r modules/memory/cyberos/requirements.txt \
            || pip install -r modules/memory/requirements.txt \
            || pip install msgspec cryptography crc32c rfc8785 'pyyaml>=6' jsonschema zstandard
      - name: schema regeneration is reproducible
        working-directory: modules/memory
        run: |
          python tools/cyberos_generate_schema.py \
              --check \
              --out memory.schema.json

  validate-memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: install deps
        # numpy + pytest-asyncio required by core semantic / dream tests
        run: |
          pip install -r modules/memory/cyberos/requirements.txt \
            || pip install -r modules/memory/requirements.txt \
            || pip install msgspec cryptography crc32c rfc8785 'pyyaml>=6' jsonschema zstandard
          pip install numpy pytest pytest-asyncio
      - name: cyberos test suite
        working-directory: modules/memory
        run: |
          # semantic_dedup suite needs optional embedding stack; gate full suite without it
          python -m pytest tests/ -q \
            --ignore=tests/core/test_consolidate_semantic_dedup.py
      - name: cyberos doctor on a fresh greenfield store
        working-directory: modules/memory
        run: |
          STORE="${RUNNER_TEMP:-/tmp}/cyberos-ci-smoke"
          rm -rf "$STORE"
          mkdir -p "$STORE/audit"
          echo '{}' > "$STORE/manifest.json"
          export CYBEROS_HOST_MOUNT_PREFIX="$(dirname "$STORE")"
          python -m cyberos --store "$STORE" doctor
