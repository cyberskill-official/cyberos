name: deploy

# Continuous delivery of the P0 stack to the Vultr VPS, entirely in GitHub Actions (moved off the local
# pre-push hook 2026-07-03). On every push to main this: (1) gates services (fmt/clippy/test) when they
# changed, (2) builds + pushes the service images to GHCR, then (3) SSHes to the VPS and runs deploy.sh
# (git pull console/Caddyfile/compose, docker pull images, roll). A non-services push (apps/web, console,
# compose) skips the gate + build and just rolls (the bundle ships via the VPS git pull). Safe by
# construction: if the gate or build fails, the roll is skipped and the site stays on the current images.
#
# One-time setup (deploy/vps/auto-deploy.md + docs/deploy/RELEASE.md): repo secrets VPS_HOST / VPS_USER / VPS_SSH_KEY,
# a read-only deploy key on the VPS for `git pull`, and a GHCR login on the VPS for `docker pull`. Image push
# uses the built-in GITHUB_TOKEN (packages: write).

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'apps/console/**'
      - 'apps/web/**'
      - 'deploy/vps/**'
      - '.github/workflows/deploy.yml'
      # the docs site ships with the product (job: docs) - rebuild it when its sources change
      - 'docs/**'
      - 'modules/*/docs/**'
      - 'services/*/docs/**'
      - 'tools/docs-site/**'
      - 'CHANGELOG.md'
      - 'VERSION'                     # TASK-DOCS-007: hub deck shows VERSION - redeploy on bump
      - 'modules/templates/**'        # TASK-DOCS-007: CDS shells/tokens feed every generated page
      - 'modules/*/CHANGELOG.md'
      - 'services/*/CHANGELOG.md'
      - 'modules/cuo/**'              # TASK-IMP-074: workflow-rule changes refresh the published site
      - 'modules/skill/**'            # TASK-IMP-074: skill-contract changes likewise (deploy leg of the rules-to-channels hook chain)
  workflow_dispatch:
    inputs:
      force_services:
        description: >-
          Run the Rust gate and REBUILD the service images even though this run touches no services/** files.
          Needed whenever code is already on main but was never built - e.g. the gate failed, the fix was a
          CI-only change, and so nothing under services/** has changed since. Without this, that code can
          never be built or deployed: the paths filter skips the build forever, the VPS keeps pulling the
          stale image from GHCR, and the deploy job reports success while shipping nothing.
        type: boolean
        default: false

concurrency:
  group: deploy-p0
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Which parts changed in this push - so a client-only push skips the Rust gate + image build and just rolls.
  changes:
    runs-on: ubuntu-latest
    outputs:
      # `|| inputs.force_services` is the manual override. On workflow_dispatch the paths filter compares HEAD
      # against the default branch and finds nothing, so it would otherwise ALWAYS skip the gate and the image
      # build - which makes a manual re-deploy of already-merged code impossible.
      services: ${{ steps.filter.outputs.services == 'true' || inputs.force_services == true }}
      # TASK-IMP-081: gates the rebuild-web job below. Deliberately NOT include apps/console/web itself -
      # that is the generated OUTPUT this job produces, and including it would make the job's own commit
      # look like a reason to run again.
      web_src: ${{ steps.filter.outputs.web_src == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            services:
              - 'services/**'
            web_src:
              - 'apps/web/**'
              - 'VERSION'

  # Rust gate (only when services changed). Blocks the roll on failure.
  gate:
    needs: changes
    if: needs.changes.outputs.services == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v7

      # This gate died on `ld: final link failed: No space left on device` the first time the workspace
      # grew by four test binaries (TASK-CHAT-267/268/269 + TASK-AUTH-111). It was not a code failure: the
      # tests never ran. The PR gate in services.yml had ALREADY been hardened against exactly this, and
      # this job never got the same treatment — so a change could pass every check on the PR and then take
      # the deploy down after merge, leaving main ahead of production with nothing red to look at. The two
      # gates now do the same thing.
      #
      # Reclaims ~25 GB of preinstalled Android/dotnet/Haskell tooling we never use.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      # Swatinem/rust-cache instead of a raw actions/cache over services/target: it caches only the
      # dependency artifacts and auto-trims stale entries, keeping the cache at ~1-3 GB rather than the
      # 9+ GB a raw target/ cache grows into. Restoring that raw cache was itself part of what filled the
      # disk. Mirrors services.yml.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - name: Disk left after the gate
        if: always()
        run: df -h /

  # Build + push the service images to GHCR (mirrors deploy/vps/build-push-images.sh). GHA layer cache keeps
  # this fast after the first run.
  build-images:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push (auth, chat, ai-gateway, embed-sidecar; eval + memory best-effort)
        working-directory: services
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          set -euo pipefail
          SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          # org.opencontainers.image.source links each GHCR package to this repo, so a package
          # created by this workflow automatically grants the repo write access. A 403 Forbidden
          # on push means the package ALREADY exists without this repo granted: fix in GitHub UI
          # (org > Packages > <package> > Package settings > Manage Actions access > add this
          # repo with Write), or delete the stale package and let this workflow recreate it.
          SRC_LABEL="org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
          build_push() {
            local pkg="$1" bin="${2:-$1}"
            docker buildx build --platform linux/amd64 --file Dockerfile \
              --build-arg "PACKAGE=${pkg}" --build-arg "BIN=${bin}" \
              --label "${SRC_LABEL}" \
              --cache-from "type=gha,scope=${pkg}" --cache-to "type=gha,mode=max,scope=${pkg}" \
              --tag "${REGISTRY}/${pkg}:latest" --tag "${REGISTRY}/${pkg}:${SHORT}" --push . \
              || { echo "::error::push failed for ${pkg} - if 403 Forbidden, grant this repo Write on the GHCR package (see comment above)"; return 1; }
          }
          # Core stack images: must succeed.
          build_push cyberos-auth
          build_push cyberos-chat
          build_push cyberos-ai-gateway cyberos-gateway
          docker buildx build --platform linux/amd64 --file embed-sidecar/Dockerfile \
            --label "${SRC_LABEL}" \
            --cache-from "type=gha,scope=embed" --cache-to "type=gha,mode=max,scope=embed" \
            --tag "${REGISTRY}/cyberos-embed-sidecar:latest" --tag "${REGISTRY}/cyberos-embed-sidecar:${SHORT}" \
            --push embed-sidecar
          # BRAIN/EVAL images: best-effort so a break here can never block the core stack (both are deploy-gated
          # OFF - eval behind DEPLOY_EVAL, memory behind DEPLOY_MEMORY - so a stale image only matters once
          # someone turns them on). Building them keeps a fresh image waiting for that flip.
          build_push cyberos-eval || echo "::warning::cyberos-eval image build failed (best-effort, deploy-gated off)"
          build_push cyberos-memory || echo "::warning::cyberos-memory image build failed (best-effort, deploy-gated off)"

  # TASK-IMP-081: rebuild + recommit apps/console/web (the tracked vite output the VPS serves via git pull)
  # whenever apps/web/** or VERSION actually changed - closing the gap TASK-IMP-080 found, where nothing
  # owned refreshing this dir after a version bump and the live badge silently lagged the platform
  # VERSION (apps/web/scripts/stamp-sw.mjs's comment documents the exact incident: v1.2.0 served while
  # the platform shipped 1.7.0).
  #
  # Gated on `web_src` (NOT unconditional): stamp-sw.mjs's cache id is a build TIMESTAMP, not a content
  # hash, so an ungated rebuild would diff - and commit - on every single deploy.yml run, including ones
  # that never touched the web app. Reuses version.yml's already-proven bot-commit pattern verbatim
  # (same cyberos-bot identity, same VERSION_BUMP_SSH_KEY deploy-key ruleset bypass, same graceful
  # degrade-to-warning if the push is blocked) rather than inventing a second one.
  rebuild-web:
    needs: changes
    if: needs.changes.outputs.web_src == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # This job is additive to the services roll, not a gate on it: apps/web and services/ are independent
    # deployables. Without this, a real build failure here (a broken `tsc`/`vite` on main, not just a
    # blocked push) would trip `failure()` and - via `deploy`'s shared `needs:` - block an otherwise-healthy
    # services roll for a completely unrelated breakage. continue-on-error still shows this job red in the
    # Actions UI (so a broken web build is never silently swallowed); it only stops that redness from
    # cascading into the services pipeline's own success/failure signal.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          # Same deploy key as version.yml (docs/deploy/RELEASE.md): the default GITHUB_TOKEN cannot
          # bypass the branch ruleset, so an unset secret here degrades the push step below to a warning
          # rather than a hard failure.
          ssh-key: ${{ secrets.VERSION_BUMP_SSH_KEY }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
      - name: Rebuild apps/web -> apps/console/web
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Commit the refreshed bundle back to main, if it changed
        run: |
          set -euo pipefail
          if git diff --quiet -- apps/console/web; then
            echo "apps/console/web unchanged after rebuild (the touched path was non-output, e.g. android/ios) - nothing to commit." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name  "cyberos-bot"
          git config user.email "bot@cyberskill.world"
          git add apps/console/web
          # [skip ci]: unlike version.yml's bump commit (which must stay visible to tag-triggered
          # workflows per TASK-IMP-071), this commit only refreshes a served artifact - it has no reason
          # to re-trigger deploy.yml a second time for itself.
          git commit -m "chore(web): rebuild served bundle @ $(cat VERSION) [skip ci]"
          if git push origin HEAD:main; then
            echo "apps/console/web rebuilt + pushed @ $(cat VERSION)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::apps/console/web rebuild computed but push blocked by the branch ruleset - not pushed. Rebuild manually: cd apps/web && npm run build"
            {
              echo "### apps/console/web rebuild computed but NOT pushed (ruleset)"
              echo "The push to main was rejected by the branch ruleset. Add a Deploy Key to the AWH gate"
              echo "ruleset bypass and set its private half as VERSION_BUMP_SSH_KEY (docs/deploy/RELEASE.md),"
              echo "or rebuild manually: cd apps/web && npm run build && git add apps/console/web && git commit && git push."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # Roll the VPS. Runs for client-only pushes too (build-images skipped); skipped only if a needed job FAILED.
  deploy:
    # rebuild-web is included so deploy.sh's VPS-side `git pull` always runs AFTER any bundle-refresh
    # push has landed on main, not racing ahead of it. A skipped rebuild-web (web_src == false) reports
    # success for `needs:` purposes, same as build-images already does when services == false.
    needs: [changes, build-images, rebuild-web]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      # A green deploy that shipped nothing is worse than a red one, and we shipped exactly that: PR #37's
      # gate died on disk exhaustion, so build-images never ran; a later CI-only commit touched no
      # services/** files, so the paths filter skipped the build AGAIN — and this job rolled the VPS anyway
      # and reported success. The VPS never compiles; it pulls prebuilt images from GHCR. So it re-pulled the
      # PRE-MERGE image, restarted it, and went green — while `git pull` + migrate.sh applied the NEW
      # migrations. Production ended up running new schema against old code, with a green tick on the run.
      #
      # If services changed and the images were not built, that is a failed deploy. Say so.
      - name: Refuse to roll a services change whose images were never built
        if: ${{ needs.changes.outputs.services == 'true' && needs.build-images.result != 'success' }}
        run: |
          echo "::error::services/** changed but build-images did not succeed (result: ${{ needs.build-images.result }})."
          echo "The VPS only pulls prebuilt images from GHCR, so rolling now would restart the OLD image and report success."
          echo "Re-run with workflow_dispatch + force_services=true once the gate is green."
          exit 1

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 600 /dev/stdin "$RUNNER_TEMP/deploy_key" <<< "$VPS_SSH_KEY"
          ssh -o StrictHostKeyChecking=accept-new -i "$RUNNER_TEMP/deploy_key" \
            "$VPS_USER@$VPS_HOST" "bash ~/cyberos/deploy/vps/deploy.sh"

  # Ship the generated docs site (os.cyberskill.world/docs). Built from the markdown single source of
  # truth in Actions and rsync'd into the existing /srv/console mount on the VPS (apps/console/docs is
  # gitignored, so the VPS git pull never conflicts with it). Independent of the service roll.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
      - name: Build the site from the markdown sources
        run: bash tools/docs-site/build.sh
      # TASK-IMP-079: shared shipper - this job and release.yml's docs job used to inline the same
      # snippet with a SHARED docs.new staging dir; a branch push + tag push seconds apart ran both
      # concurrently and the loser died at mv (deploy run #127). ship.sh stages per-run and swaps
      # under a remote flock, so concurrent shippers are safe.
      - name: Ship to the VPS (/srv/console/docs)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: bash tools/docs-site/ship.sh
