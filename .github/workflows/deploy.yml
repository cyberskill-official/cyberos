name: deploy

# Auto-deploy the P0 stack to the Vultr VPS on every push to main - but GitHub only DEPLOYS, it never builds
# or tests. All heavy work runs LOCALLY in the pre-push hook (.githooks/pre-push): format, clippy, tests, and
# the image build + push to GHCR. So by the time a push lands here, the fresh images are already in GHCR and
# this job just SSHes in and runs deploy.sh (git pull console/Caddyfile/compose, docker pull images, restart).
# The VPS never compiles.
#
# One-time setup (deploy/vps/auto-deploy.md): GitHub secrets VPS_HOST / VPS_USER / VPS_SSH_KEY, a read-only
# deploy key on the VPS for `git pull`, and a GHCR login on the VPS for `docker pull`.

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'apps/console/**'
      - 'apps/web/**'
      - 'deploy/vps/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-p0
  cancel-in-progress: false

jobs:
  deploy:
    name: roll the VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 600 /dev/stdin "$RUNNER_TEMP/deploy_key" <<< "$VPS_SSH_KEY"
          ssh -o StrictHostKeyChecking=accept-new -i "$RUNNER_TEMP/deploy_key" \
            "$VPS_USER@$VPS_HOST" "bash ~/cyberos/deploy/vps/deploy.sh"
