name: deploy

# Auto-deploy the P0 stack to the Vultr VPS on every push to main. The images are built HERE (the CI
# runner has the RAM the 4 GB VPS does not), pushed to GHCR, and the VPS only pulls + restarts - it never
# compiles Rust. The console, Caddyfile, and compose come from the VPS git checkout.
#
# One-time setup (see deploy/vps/auto-deploy.md): GitHub secrets VPS_HOST / VPS_USER / VPS_SSH_KEY, a
# read-only deploy key on the VPS for `git pull`, and a GHCR login on the VPS for `docker pull`.

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'apps/console/**'
      - 'deploy/vps/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-p0
  cancel-in-progress: false

jobs:
  build-images:
    name: build + push images (auth, chat)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push auth
        uses: docker/build-push-action@v6
        with:
          context: services
          file: services/Dockerfile
          build-args: |
            PACKAGE=cyberos-auth
            BIN=cyberos-auth
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cyberos-auth:latest
            ghcr.io/${{ github.repository_owner }}/cyberos-auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push chat
        uses: docker/build-push-action@v6
        with:
          context: services
          file: services/Dockerfile
          build-args: |
            PACKAGE=cyberos-chat
            BIN=cyberos-chat
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cyberos-chat:latest
            ghcr.io/${{ github.repository_owner }}/cyberos-chat:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: roll the VPS
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 600 /dev/stdin "$RUNNER_TEMP/deploy_key" <<< "$VPS_SSH_KEY"
          ssh -o StrictHostKeyChecking=accept-new -i "$RUNNER_TEMP/deploy_key" \
            "$VPS_USER@$VPS_HOST" "bash ~/cyberos/deploy/vps/deploy.sh"
