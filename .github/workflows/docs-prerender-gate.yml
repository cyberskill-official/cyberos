# docs-prerender-gate.yml — the website is GENERATED from the markdown single source of
# truth (TASK-DOCS-002) into gitignored dist/website; nothing generated is committed. This
# gate proves the whole site still builds from the sources on every docs-touching PR
# (broken links to assets and unreadable sources fail the build).

name: docs-prerender-gate

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'docs/**'
      - 'modules/*/docs/**'
      - 'services/*/docs/**'
      - 'tools/docs-site/**'
      - 'CHANGELOG.md'
      - 'modules/*/CHANGELOG.md'
      - 'services/*/CHANGELOG.md'

jobs:
  docs-build:
    name: site builds from sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build the site from the markdown sources
        run: bash tools/docs-site/build.sh

      - name: Sanity
        run: test -f dist/website/index.html && test -f dist/website/reference/fr-catalog.html && echo "site built"
