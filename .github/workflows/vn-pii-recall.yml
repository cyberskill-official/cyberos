name: VN PII Recall Gate

on:
  pull_request:
    paths:
      - 'services/ai-gateway/pii/**'
      - '.github/workflows/vn-pii-recall.yml'

jobs:
  recall:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: services/ai-gateway/pii
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/ai-gateway/pii/requirements.txt

      - name: Install sidecar test dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate fixture format
        run: python scripts/validate_corpus_format.py

      - name: Run offline recognizer import lint
        run: python -m pytest test_no_network_imports.py -v --tb=short

      - name: Run recall gate
        env:
          CYBEROS_PII_PATTERN_ONLY_NLP: '1'
        run: |
          python -m pytest \
            tests/test_recall_gate.py \
            tests/test_fixture_invariants.py \
            tests/test_no_real_pii_in_corpus.py \
            tests/test_recall_gate_runtime_budget.py \
            -v --tb=short

      - name: Run precision warning report
        env:
          CYBEROS_PII_PATTERN_ONLY_NLP: '1'
        run: python -m pytest tests/test_precision_warning.py -v --tb=short

      - name: Upload recall report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recall_gate_report_${{ github.sha }}
          path: services/ai-gateway/pii/recall_gate_report_${{ github.sha }}.json

      - name: Upload precision warning report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: precision_warning_report_${{ github.sha }}
          path: services/ai-gateway/pii/precision_warning_report_${{ github.sha }}.json
