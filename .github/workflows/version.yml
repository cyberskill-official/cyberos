name: version

# Auto version, manual release. On every push to main this computes the next CyberOS version
# from the new Conventional Commits (feat -> minor, fix/perf/revert/refactor -> patch, ! or
# BREAKING CHANGE -> major) and, when a bump is due, commits the new VERSION + CHANGELOG back
# to main as `chore(release): vX.Y.Z` (no [skip ci] - TASK-IMP-071: the bump commit MUST be visible
# to push-triggered workflows so tag pushes fire release.yml natively and deploy.yml refreshes the
# docs at the new VERSION). It NEVER tags, builds installers, or deploys -
# cutting a release stays a manual action: `git tag vX.Y.Z && git push origin vX.Y.Z` (release.yml).
#
# Loop-safe via the job guard below (bump commits start with 'chore(release):', which this
# also guards on the head commit message. Manual override: put `Release-As: X.Y.Z` in a commit
# body, or run this workflow via the Actions tab (workflow_dispatch) with an explicit level.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      level:
        description: 'Force a bump level (leave blank to compute from commits)'
        required: false
        type: choice
        options: ['', patch, minor, major]
        default: ''

concurrency:
  group: cyberos-version
  cancel-in-progress: false

permissions:
  contents: write # commit the version bump back to main

jobs:
  bump:
    # skip our own release commits (the ONLY loop guard since TASK-IMP-071 dropped [skip ci])
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags: the baseline is the last commit that touched VERSION
          ref: main
          # Optional deploy key so the bump can push past the branch ruleset. The default GITHUB_TOKEN
          # CANNOT bypass a ruleset; a Deploy Key added to the ruleset bypass list can. Unset = fall back to
          # the token, and the push step below degrades to a warning instead of failing. Setup in RELEASE.md.
          ssh-key: ${{ secrets.VERSION_BUMP_SSH_KEY }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24.18.0'
      - name: Compute + apply the next version
        id: bump
        run: node scripts/cyberos-version.mjs --apply ${{ github.event.inputs.level && format('--level {0}', github.event.inputs.level) || '' }}
      # apps/console/web is the tracked vite output the VPS serves, and it stamps its own version.json from
      # VERSION at build time. check-version-sync.sh asserts the two agree (TASK-IMP-080 item 7). The step
      # above has just moved VERSION in the workspace, so without this rebuild the tracked bundle is one
      # version behind and that assertion fails before the bump is ever committed. That is precisely what
      # broke 1.0.2 -> 1.0.3: run 29753051609, "DRIFT apps/console/web/version.json: 1.0.2 != 1.0.3",
      # exit 10.
      #
      # deploy.yml cannot cover this. It runs afterwards and rebuilds at the COMMITTED VERSION, so VERSION
      # could never advance past the bundle's stamp - the two were deadlocked. It went unnoticed only
      # because the 1.0.x run-up re-applied the SAME version repeatedly (three `chore(release): 1.0.2`
      # commits), which the assertion is blind to.
      #
      # Rebuilding here, before the proof, closes the loop and restores TASK-IMP-072's rule that the bump
      # commit carries the whole codebase to the new version. apps/console/web joins that commit's `git add`
      # below for the same reason.
      - name: Rebuild the served bundle at the new version
        if: ${{ steps.bump.outputs.changed == 'true' }}
        working-directory: apps/web
        run: |
          npm ci
          npm run build
      # TASK-IMP-068 §1 #7 (amended by TASK-IMP-071): payload-gate.yml now ALSO sees the bump commit
      # (no [skip ci]); this inline proof stays as belt-and-suspenders at zero marginal cost.
      - name: Prove a payload builds clean at the new version
        if: ${{ steps.bump.outputs.changed == 'true' }}
        run: |
          bash tools/install/build.sh "$RUNNER_TEMP/payload"
          bash tools/install/check-version-sync.sh "$RUNNER_TEMP/payload"
      - name: Commit the bump back to main
        if: ${{ steps.bump.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          git config user.name  "cyberos-bot"
          git config user.email "bot@cyberskill.world"
          # BUILD_NUMBER is bumped by the same script and MUST be committed alongside VERSION. It is the
          # monotonic counter Google Play and App Store Connect order uploads by, and it is deliberately
          # NOT derived from the semver (see scripts/stamp-release-version.mjs). Left unstaged, it silently
          # resets on the next checkout and every subsequent store upload is rejected as a duplicate.
          # TASK-IMP-072: the bump commit carries the WHOLE codebase to the new version - installers,
          # store projects, package manifests - so no file anywhere ever disagrees with VERSION.
          node scripts/stamp-release-version.mjs --apply
          # NOTE: the MCP server package lives at tools/install/mcp/ (not root mcp/ - a
          # nonexistent pathspec here is fatal and killed run #36). Keep this list in lockstep
          # with the stampJson/stampCargo/stampGradle/stampXcodeProj calls in the stamper script.
          # apps/console/web is the served vite output rebuilt above. It is a DIRECTORY, not a stamped
          # file, because a rebuild also rewrites the hashed asset filenames and sw.js cache name, not just
          # version.json - staging the file alone would leave the bundle internally inconsistent.
          git add VERSION BUILD_NUMBER CHANGELOG.md \
            apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml \
            apps/web/package.json apps/web/android/app/build.gradle \
            apps/web/ios/App/App.xcodeproj/project.pbxproj tools/install/mcp/package.json \
            apps/console/web
          git commit -m "chore(release): ${{ steps.bump.outputs.version }}"
          # A protected-branch ruleset blocks a direct push from the default token. With a deploy key
          # configured (secrets.VERSION_BUMP_SSH_KEY, added to the ruleset bypass) the push succeeds;
          # otherwise degrade to a warning so the workflow does not fail red on every merge to main.
          if git push origin HEAD:main; then
            echo "CyberOS VERSION -> ${{ steps.bump.outputs.version }} (not released; tag v${{ steps.bump.outputs.version }} to cut a release)" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### VERSION bump ${{ steps.bump.outputs.version }} computed but NOT pushed"
              echo "The push to main was rejected by the branch ruleset. To land auto-bumps, add a Deploy Key to"
              echo "the AWH gate ruleset bypass and set its private half as the VERSION_BUMP_SSH_KEY secret"
              echo "(docs/deploy/RELEASE.md). Until then, bump VERSION when you cut a release."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::VERSION bump ${{ steps.bump.outputs.version }} computed but push blocked by the ruleset - not pushed."
          fi
      - name: No bump needed
        if: ${{ steps.bump.outputs.changed != 'true' }}
        run: echo "No feat/fix/breaking commits since the last bump - VERSION unchanged (${{ steps.bump.outputs.version }})." >> "$GITHUB_STEP_SUMMARY"
