name: Anti-Regression

# FR-OBS-005 — CI-blocking suite covering all 22 modules' critical paths,
# cross-tenant invariants, persona-scope contracts, EU AI Act high-risk
# human-in-the-loop, audit-chain integrity. A failed run blocks deploy.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly full-suite + load run
    - cron: '0 18 * * *'  # 01:00 ICT

concurrency:
  group: anti-regression-${{ github.ref }}
  cancel-in-progress: false  # never cancel a regression run mid-flight

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9.15.0

jobs:
  fast-suite:
    name: Anti-regression — fast suite (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Fast subset (AUTH + AI + MCP + audit-chain)
        run: pnpm anti-regression --filter @cyberos/auth --filter @cyberos/ai --filter @cyberos/mcp --filter @cyberos/audit-chain

  full-suite:
    name: Anti-regression — full suite (main + nightly)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Full anti-regression suite
        run: pnpm anti-regression
      - name: Cross-tenant invariant tests
        run: pnpm --filter @cyberos/ten run invariant-tests
      - name: Audit-chain external verifier
        run: pnpm --filter @cyberos/audit-chain run verify-chain
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anti-regression-report-${{ github.run_id }}
          path: anti-regression-report.json
          retention-days: 90

  weekly-stress:
    name: Anti-regression — weekly stress (load + soak)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0'
    steps:
      - uses: actions/checkout@v4
      - run: echo 'TODO: kick off load-test/p3-gate-soak in dedicated shard'
