name: VN PII Corpus Quarterly Refresh Reminder

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch: {}

jobs:
  open-refresh-issue:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const quarter = Math.floor(now.getUTCMonth() / 3) + 1;
            const year = now.getUTCFullYear();
            const title = `VN PII corpus refresh due — quarter Q${quarter}${year}`;
            const body = [
              'FR-AI-013 requires a quarterly refresh of the VN PII recall corpus.',
              '',
              '**Codeowner:** @cyberos/engineering (default owner from `.github/CODEOWNERS`)',
              '',
              'Runbook:',
              '1. Review new VN province codes, telco prefixes, bank account formats, and production edge cases.',
              '2. Update `services/ai-gateway/pii/fixtures/vn_pii_200_samples.yaml` while preserving the manifest distribution.',
              '3. Run `cd services/ai-gateway/pii && python scripts/regen_fixture.py`.',
              '4. Run `cd services/ai-gateway/pii && make pii-all`.',
              '5. Commit the refreshed fixture, manifest version/date, and README maintenance note.',
            ].join('\n');

            const {owner, repo} = context.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'vn-pii-corpus-refresh',
            });
            if (existing.some(issue => issue.title === title)) {
              core.info(`Issue already exists: ${title}`);
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['vn-pii-corpus-refresh', 'compliance', 'ai-gateway'],
            });
