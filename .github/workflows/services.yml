name: services

on:
  # Heavy lint + test runs LOCALLY at push time via .githooks/pre-push - GitHub no longer runs it on push
  # (CI is deploy-only). Still available on pull requests and on demand.
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'services/**'
      - '.github/workflows/services.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------------------------------------------------------------------------
  # Pure-Rust gate — fmt, clippy, build, unit tests (no Postgres).
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: lint + test (pure-Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4

      # The cargo cache (services/target) is multi-GB; reclaim the runner's
      # preinstalled Android/dotnet/haskell tooling first so the restore + build
      # do not hit "No space left on device".
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/target
          key: cargo-services-${{ runner.os }}-${{ hashFiles('services/**/Cargo.lock', 'services/**/Cargo.toml') }}
          restore-keys: |
            cargo-services-${{ runner.os }}-

      # fmt is run as a non-blocking style hint until the codebase reaches
      # steady-state. CI flags violations + suggests `cargo fmt --all` locally;
      # the gate is clippy + tests, not whitespace.
      - name: cargo fmt --check (informational)
        id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: fmt hint
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::warning::cargo fmt --check reported formatting drift."
          echo "::warning::Run 'cargo fmt --all' in services/ locally + commit the result."

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --no-deps

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test (no postgres)
        run: cargo test --workspace --no-fail-fast

  # ---------------------------------------------------------------------------
  # Integration gate — boots Postgres + Apache AGE + Redis via docker-compose
  # and runs the `--ignored` tests (FR-AUTH-003 RLS isolation + FR-AUTH-004
  # JWT roundtrip + FR-MEMORY-101 chain-anchor against real DB).
  # ---------------------------------------------------------------------------
  integration:
    name: integration (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/target
          key: cargo-services-${{ runner.os }}-${{ hashFiles('services/**/Cargo.lock', 'services/**/Cargo.toml') }}

      # FR-AUTH-106 — install MaxMind GeoLite2 + Anonymous-IP if the CI runner
      # has access to a license key. auth geoip tests skip cleanly when absent.
      - name: Install GeoLite2 DBs (optional — gated on secret)
        if: env.MAXMIND_LICENSE_KEY != ''
        working-directory: ${{ github.workspace }}
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
          GEOIP_DEST: ${{ runner.temp }}/geoip
        run: |
          bash services/auth/scripts/install-geoip.sh
          echo "AUTH_GEOIP_DB=${{ runner.temp }}/geoip/GeoLite2-City.mmdb" >> "$GITHUB_ENV"
          echo "AUTH_GEOIP_ANONYMOUS_DB=${{ runner.temp }}/geoip/GeoIP2-Anonymous-IP.mmdb" >> "$GITHUB_ENV"

      # Single source of truth for DB-backed verification: the SAME script developers run
      # locally. It boots Postgres+Redis (dev/docker-compose.yml, pgvector image), applies
      # every crate's migrations in dependency order (auth -> mcp-gateway -> memory -> ...),
      # and runs each module suite with --include-ignored --test-threads=1. Running the whole
      # workspace at once with partial migrations (the old approach) pulled in crates whose
      # migrations weren't applied and raced the shared DB without --test-threads=1.
      - name: Local verify (migrations + module suites, incl DB-backed)
        working-directory: ${{ github.workspace }}
        run: bash scripts/local_verify.sh

      - name: Tear down dev stack
        if: always()
        run: cd dev && docker compose down -v
