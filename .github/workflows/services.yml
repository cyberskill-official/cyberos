name: services

on:
  push:
    branches: [ main ]
    paths:
      - 'services/**'
      - '.github/workflows/services.yml'
  pull_request:
    paths:
      - 'services/**'
      - '.github/workflows/services.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------------------------------------------------------------------------
  # Pure-Rust gate — fmt, clippy, build, unit tests (no Postgres).
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: lint + test (pure-Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/target
          key: cargo-services-${{ runner.os }}-${{ hashFiles('services/**/Cargo.lock', 'services/**/Cargo.toml') }}
          restore-keys: |
            cargo-services-${{ runner.os }}-

      # fmt is run as a non-blocking style hint until the codebase reaches
      # steady-state. CI flags violations + suggests `cargo fmt --all` locally;
      # the gate is clippy + tests, not whitespace.
      - name: cargo fmt --check (informational)
        id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: fmt hint
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::warning::cargo fmt --check reported formatting drift."
          echo "::warning::Run 'cargo fmt --all' in services/ locally + commit the result."

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --no-deps

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test (no postgres)
        run: cargo test --workspace --no-fail-fast

  # ---------------------------------------------------------------------------
  # Integration gate — boots Postgres + Apache AGE + Redis via docker-compose
  # and runs the `--ignored` tests (FR-AUTH-003 RLS isolation + FR-AUTH-004
  # JWT roundtrip + FR-MEMORY-101 chain-anchor against real DB).
  # ---------------------------------------------------------------------------
  integration:
    name: integration (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/target
          key: cargo-services-${{ runner.os }}-${{ hashFiles('services/**/Cargo.lock', 'services/**/Cargo.toml') }}

      - name: Boot dev stack (Postgres + Apache AGE + Redis)
        run: |
          cd dev
          docker compose up -d
          # Wait until Postgres reports healthy.
          for i in {1..30}; do
            if docker compose ps postgres | grep -q '(healthy)'; then echo "postgres is up"; break; fi
            sleep 2
          done

      - name: Install sqlx-cli
        run: cargo install --locked --version 0.8.0 sqlx-cli --no-default-features --features postgres

      # FR-AUTH-106 — install MaxMind GeoLite2 + Anonymous-IP if the CI runner
      # has access to a license key. Tests in `tests/geoip_test.rs` skip
      # cleanly when AUTH_GEOIP_DB is absent.
      - name: Install GeoLite2 DBs (optional — gated on secret)
        if: env.MAXMIND_LICENSE_KEY != ''
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
          GEOIP_DEST: ${{ runner.temp }}/geoip
        run: |
          bash services/auth/scripts/install-geoip.sh
          echo "AUTH_GEOIP_DB=${{ runner.temp }}/geoip/GeoLite2-City.mmdb" >> "$GITHUB_ENV"
          echo "AUTH_GEOIP_ANONYMOUS_DB=${{ runner.temp }}/geoip/GeoIP2-Anonymous-IP.mmdb" >> "$GITHUB_ENV"

      - name: Apply migrations — auth
        env:
          DATABASE_URL: postgres://cyberos:cyberos@localhost:5432/cyberos
        run: cd auth && sqlx migrate run

      - name: Apply migrations — memory
        run: cat memory/migrations/*.sql | docker exec -i cyberos-postgres psql -U cyberos -d cyberos

      - name: cargo test (Postgres-required)
        env:
          DATABASE_URL: postgres://cyberos:cyberos@localhost:5432/cyberos
        run: cargo test --workspace --no-fail-fast -- --ignored

      - name: Tear down dev stack
        if: always()
        run: cd dev && docker compose down -v
