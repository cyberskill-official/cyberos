packages:
  - "apps/*"
  - "packages/*"

# Modules whose folder is intentionally not a workspace package
# (templates, internal tools, etc.). They live under apps/ but are
# excluded from the install graph.
ignoredBuiltDependencies: []

# Pin runtime versions explicitly so every engineer gets the same toolchain.
# Bump in a single PR; the lockfile catches drift.
catalog:
  apollo-server: ^5.0.0
  "@apollo/subgraph": ^3.0.0
  graphql: ^16.9.0
  express: ^4.21.0
  pino: ^9.5.0
  prisma: ^6.0.0
  "@prisma/client": ^6.0.0
  "@modelcontextprotocol/sdk": ^2.0.0
  nats: ^2.28.0
  socket.io: ^4.8.0
  redis: ^4.7.0
  ioredis: ^5.4.0
  zod: ^3.23.0
  vitest: ^2.1.0
